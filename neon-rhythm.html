<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OG NEON</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Share+Tech+Mono&display=swap');

  :root {
    --cyan:   #00ffff;
    --pink:   #ff00ff;
    --yellow: #ffff00;
    --green:  #00ff88;
    --orange: #ff6600;
    --bg:     #050510;
    --track-bg: #0a0a1e;
    --glow-cyan:   0 0 10px #00ffff, 0 0 20px #00ffff, 0 0 40px #00ffff;
    --glow-pink:   0 0 10px #ff00ff, 0 0 20px #ff00ff, 0 0 40px #ff00ff;
    --glow-yellow: 0 0 10px #ffff00, 0 0 20px #ffff00, 0 0 40px #ffff00;
    --glow-green:  0 0 10px #00ff88, 0 0 20px #00ff88, 0 0 40px #00ff88;
  }

  *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }

  body {
    background: var(--bg);
    font-family: 'Orbitron', sans-serif;
    overflow: hidden;
    height: 100vh; width: 100vw;
    display: flex; align-items: center; justify-content: center;
  }

  body::after {
    content:''; position:fixed; inset:0;
    background: repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,0.07) 2px,rgba(0,0,0,0.07) 4px);
    pointer-events:none; z-index:200;
  }
  body::before {
    content:''; position:fixed; inset:0;
    background-image:
      linear-gradient(rgba(0,255,255,0.03) 1px,transparent 1px),
      linear-gradient(90deg,rgba(0,255,255,0.03) 1px,transparent 1px);
    background-size:40px 40px; pointer-events:none;
  }

  /* ── SCREENS ── */
  .screen {
    display:none; position:fixed; inset:0;
    flex-direction:column; align-items:center; justify-content:center;
    z-index:10;
  }
  .screen.active { display:flex; }
  .screen.entering { animation: screenEnter 0.35s ease forwards; }
  .screen.exiting  { animation: screenExit  0.25s ease forwards; pointer-events:none; }

  @keyframes screenEnter {
    0%   { opacity:0; transform: scale(0.96) translateY(12px); filter: brightness(2); }
    60%  { filter: brightness(1.2); }
    100% { opacity:1; transform: scale(1) translateY(0); filter: brightness(1); }
  }
  @keyframes screenExit {
    0%   { opacity:1; transform: scale(1); filter: brightness(1); }
    100% { opacity:0; transform: scale(1.04); filter: brightness(2); }
  }

  /* ── FLASH OVERLAY ── */
  #flashOverlay {
    position: fixed; inset: 0; z-index: 999;
    pointer-events: none;
    background: linear-gradient(135deg, rgba(0,255,255,0.15), rgba(255,0,255,0.15));
    opacity: 0;
  }
  #flashOverlay.flash { animation: overlayFlash 0.4s ease forwards; }
  @keyframes overlayFlash {
    0%   { opacity: 0; }
    30%  { opacity: 1; }
    100% { opacity: 0; }
  }

  /* ── SITE TRANSITION OVERLAY ── */
  #siteTransition {
    position: fixed; inset: 0; z-index: 1000;
    background: var(--bg);
    display: flex; align-items: center; justify-content: center;
    pointer-events: none;
    opacity: 0;
  }
  #siteTransition.sweep-in  { animation: siteSweepIn  0.5s cubic-bezier(0.7,0,0.3,1) forwards; }
  #siteTransition.sweep-out { animation: siteSweepOut 0.5s cubic-bezier(0.7,0,0.3,1) forwards; }
  @keyframes siteSweepIn {
    0%   { opacity:1; clip-path: inset(0 100% 0 0); }
    100% { opacity:1; clip-path: inset(0 0% 0 0); }
  }
  @keyframes siteSweepOut {
    0%   { opacity:1; clip-path: inset(0 0% 0 0); }
    100% { opacity:1; clip-path: inset(0 0 0 100%); }
  }
  .site-transition-logo {
    font-family: 'Orbitron', sans-serif; font-weight: 900;
    font-size: clamp(40px, 10vw, 80px); letter-spacing: 0.3em;
    background: linear-gradient(135deg, var(--cyan), var(--pink));
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    background-clip: text;
    filter: drop-shadow(0 0 30px rgba(0,255,255,0.8));
    animation: logoPulse 1s ease-in-out infinite;
  }

  /* ── MAIN MENU ── */
  #menuScreen { gap:28px; }

  .logo { text-align:center; line-height:1; }
  .logo-main {
    font-size:clamp(60px,12vw,110px); font-weight:900; letter-spacing:0.2em;
    background:linear-gradient(135deg,var(--cyan),var(--pink));
    -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text;
    animation:logoPulse 2s ease-in-out infinite;
  }
  .logo-sub {
    font-size:clamp(12px,1.8vw,18px); color:var(--cyan);
    letter-spacing:0.6em; text-shadow:var(--glow-cyan); animation:flicker 4s infinite;
  }

  @keyframes logoPulse {
    0%,100%{ filter:drop-shadow(0 0 20px rgba(0,255,255,.5)) drop-shadow(0 0 40px rgba(255,0,255,.3)); }
    50%    { filter:drop-shadow(0 0 40px rgba(0,255,255,.9)) drop-shadow(0 0 80px rgba(255,0,255,.7)); }
  }
  @keyframes flicker {
    0%,95%,100%{opacity:1;} 96%{opacity:.4;} 97%{opacity:1;} 98%{opacity:.6;} 99%{opacity:1;}
  }

  .menu-btns { display:flex; flex-direction:column; gap:14px; width:100%; max-width:320px; }

  .menu-btn {
    background:transparent; border:2px solid var(--cyan); color:var(--cyan);
    font-family:'Orbitron',sans-serif; font-size:16px; font-weight:700;
    letter-spacing:0.25em; padding:14px 32px; cursor:pointer;
    text-shadow:var(--glow-cyan);
    box-shadow:0 0 20px rgba(0,255,255,.15),inset 0 0 20px rgba(0,255,255,.04);
    transition:all .2s;
    clip-path:polygon(10px 0%,100% 0%,calc(100% - 10px) 100%,0% 100%);
  }
  .menu-btn:hover {
    background:rgba(0,255,255,.1);
    box-shadow:0 0 40px rgba(0,255,255,.5),inset 0 0 30px rgba(0,255,255,.1);
    transform:scale(1.04);
  }

  .back-link {
    font-size:11px; letter-spacing:.2em; color:rgba(0,255,255,.35);
    text-decoration:none; font-family:'Orbitron',sans-serif; transition:color .2s;
  }
  .back-link:hover { color:var(--cyan); }

  /* ── SONG SELECT SCREEN ── */
  #songScreen { gap:22px; }

  .screen-title {
    font-size:clamp(18px,3vw,28px); font-weight:900; letter-spacing:.3em;
    color:var(--cyan); text-shadow:var(--glow-cyan);
  }

  .song-list { display:flex; flex-direction:column; gap:10px; width:100%; max-width:480px; }

  .song-card {
    background:rgba(0,255,255,.04); border:1px solid rgba(0,255,255,.2);
    padding:16px 20px; cursor:pointer; transition:all .2s;
    display:flex; justify-content:space-between; align-items:center;
  }
  .song-card:hover, .song-card.selected {
    background:rgba(0,255,255,.1); border-color:var(--cyan);
    box-shadow:0 0 24px rgba(0,255,255,.15);
  }
  .song-card.selected { border-color:var(--yellow); box-shadow:0 0 24px rgba(255,255,0,.2); }

  .song-info { display:flex; flex-direction:column; gap:4px; }
  .song-name { font-size:15px; font-weight:700; letter-spacing:.1em; color:white; }
  .song-artist { font-size:11px; color:rgba(255,255,255,.45); font-family:'Share Tech Mono',monospace; letter-spacing:.1em; }
  .status-badge {
    font-family:'Share Tech Mono',monospace; font-size:9px; letter-spacing:0.15em;
    padding:3px 8px; border-radius:3px; white-space:nowrap;
  }
  .status-ready {
    background:rgba(0,255,136,0.15); color:var(--green); border:1px solid var(--green);
    box-shadow:0 0 8px rgba(0,255,136,0.2);
  }
  .status-wip {
    background:rgba(255,102,0,0.12); color:#ff9944; border:1px solid #ff6600;
    animation: wipFlicker 3s steps(1) infinite;
  }
  @keyframes wipFlicker {
    0%,90%,100% { opacity:1; } 92% { opacity:0.5; } 94% { opacity:1; } 96% { opacity:0.7; }
  }

  .song-num {
    font-size:28px; font-weight:900; font-family:'Share Tech Mono',monospace;
    color:rgba(0,255,255,.2); transition:color .2s;
  }
  .song-card.selected .song-num { color:var(--yellow); text-shadow:var(--glow-yellow); }

  .nav-btns { display:flex; gap:14px; }
  .nav-btn {
    background:transparent; font-family:'Orbitron',sans-serif;
    font-size:13px; font-weight:700; letter-spacing:.2em;
    padding:12px 28px; cursor:pointer; transition:all .2s;
    clip-path:polygon(8px 0%,100% 0%,calc(100% - 8px) 100%,0% 100%);
  }
  .nav-btn-back  { border:2px solid rgba(255,255,255,.2); color:rgba(255,255,255,.5); }
  .nav-btn-back:hover  { border-color:white; color:white; }
  .nav-btn-next  { border:2px solid var(--cyan); color:var(--cyan); text-shadow:var(--glow-cyan); box-shadow:0 0 20px rgba(0,255,255,.15); }
  .nav-btn-next:hover  { background:rgba(0,255,255,.1); box-shadow:0 0 40px rgba(0,255,255,.5); transform:scale(1.04); }

  /* ── DIFFICULTY SELECT SCREEN ── */
  #diffScreen { gap:22px; }

  .selected-song-banner {
    text-align:center;
    border:1px solid rgba(0,255,255,.15);
    padding:12px 32px;
    background:rgba(0,255,255,.04);
  }
  .banner-label { font-size:10px; letter-spacing:.4em; color:rgba(255,255,255,.35); font-family:'Share Tech Mono',monospace; margin-bottom:4px; }
  .banner-title { font-size:18px; font-weight:700; letter-spacing:.1em; color:white; }

  .diff-list { display:flex; flex-direction:column; gap:8px; width:100%; max-width:380px; }
  .diff-btn {
    width:100%; background:transparent; border:1px solid rgba(0,255,255,.25);
    color:white; font-family:'Orbitron',sans-serif; font-size:13px;
    padding:12px 18px; cursor:pointer;
    display:flex; justify-content:space-between; align-items:center;
    transition:all .2s; letter-spacing:.05em;
  }
  .diff-btn:hover, .diff-btn.selected {
    background:rgba(0,255,255,.08); border-color:var(--cyan);
    box-shadow:0 0 20px rgba(0,255,255,.1);
  }
  .diff-badge { font-size:10px; font-family:'Share Tech Mono',monospace; padding:3px 8px; border-radius:3px; }
  .easy   { background:rgba(0,255,136,.2);  color:var(--green);  border:1px solid var(--green); }
  .medium { background:rgba(255,255,0,.2);  color:var(--yellow); border:1px solid var(--yellow); }
  .hard   { background:rgba(255,0,255,.2);  color:var(--pink);   border:1px solid var(--pink); }

  .play-btn {
    background:transparent; border:2px solid var(--cyan); color:var(--cyan);
    font-family:'Orbitron',sans-serif; font-size:18px; font-weight:700;
    letter-spacing:.3em; padding:14px 48px; cursor:pointer;
    text-shadow:var(--glow-cyan);
    box-shadow:0 0 20px rgba(0,255,255,.2),inset 0 0 20px rgba(0,255,255,.05);
    transition:all .2s;
    clip-path:polygon(10px 0%,100% 0%,calc(100% - 10px) 100%,0% 100%);
  }
  .play-btn:hover {
    background:rgba(0,255,255,.1);
    box-shadow:0 0 40px rgba(0,255,255,.5),inset 0 0 30px rgba(0,255,255,.1);
    transform:scale(1.05);
  }

  /* ── GAME SCREEN ── */
  #gameScreen { justify-content:flex-start; gap:0; }

  .hud {
    width:100%; max-width:700px;
    display:flex; justify-content:space-between; align-items:center;
    padding:10px 20px; flex-shrink:0;
  }
  .score-display { display:flex; flex-direction:column; }
  .score-label { font-size:10px; letter-spacing:.3em; color:rgba(255,255,255,.4); font-family:'Share Tech Mono',monospace; }
  .score-value { font-size:34px; font-weight:900; color:white; text-shadow:0 0 20px rgba(255,255,255,.5); }
  .hud-center { text-align:center; }
  .now-playing-label { font-size:9px; letter-spacing:.3em; color:rgba(255,255,255,.3); font-family:'Share Tech Mono',monospace; }
  .now-playing-title { font-size:13px; font-weight:700; color:rgba(255,255,255,.7); letter-spacing:.05em; }
  .combo-value { font-size:24px; font-weight:900; color:var(--yellow); text-shadow:var(--glow-yellow); }
  .combo-label { font-size:9px; letter-spacing:.3em; color:rgba(255,255,0,.5); font-family:'Share Tech Mono',monospace; }
  @keyframes comboPulse { 0%{transform:scale(1.5);} 100%{transform:scale(1);} }

  .health-bar-wrap { display:flex; flex-direction:column; gap:4px; align-items:flex-end; }
  .health-label { font-size:10px; letter-spacing:.3em; color:rgba(255,255,255,.4); font-family:'Share Tech Mono',monospace; }
  .health-bar { width:120px; height:10px; background:rgba(255,255,255,.1); border-radius:5px; overflow:hidden; border:1px solid rgba(255,255,255,.2); }
  .health-fill { height:100%; background:linear-gradient(90deg,var(--green),var(--cyan)); box-shadow:0 0 10px rgba(0,255,136,.8); border-radius:5px; transition:width .2s; }

  .game-area {
    position:relative; width:100%; max-width:700px;
    flex:1; min-height:0;
    background:var(--track-bg); border:1px solid rgba(0,255,255,.15);
    box-shadow:0 0 40px rgba(0,255,255,.05),inset 0 0 60px rgba(0,0,0,.5);
    overflow:hidden;
  }
  #gameCanvas { position:absolute; top:0; left:0; width:100%; height:100%; display:block; }
  .hit-line {
    position:absolute; left:0; right:0; bottom:80px; height:2px;
    background:linear-gradient(90deg,transparent,rgba(255,255,255,.1),rgba(255,255,255,.4),rgba(255,255,255,.1),transparent);
    pointer-events:none; z-index:5;
  }

  .key-zone {
    width:100%; max-width:700px; display:flex; height:80px;
    background:rgba(0,0,0,.6); border:1px solid rgba(255,255,255,.05);
    border-top:none; flex-shrink:0;
  }
  .lane-key {
    flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center;
    cursor:pointer; transition:all .08s; border-right:1px solid rgba(255,255,255,.04);
  }
  .lane-key:last-child { border-right:none; }
  .key-letter {
    width:40px; height:40px; border:2px solid; border-radius:6px;
    display:flex; align-items:center; justify-content:center;
    font-size:16px; font-weight:700; font-family:'Share Tech Mono',monospace; transition:all .08s;
  }
  .lane-key[data-lane="0"] .key-letter { border-color:var(--cyan);   color:var(--cyan); }
  .lane-key[data-lane="1"] .key-letter { border-color:var(--pink);   color:var(--pink); }
  .lane-key[data-lane="2"] .key-letter { border-color:var(--yellow); color:var(--yellow); }
  .lane-key[data-lane="3"] .key-letter { border-color:var(--green);  color:var(--green); }
  .lane-key.pressed[data-lane="0"] .key-letter { background:rgba(0,255,255,.25);  box-shadow:var(--glow-cyan); }
  .lane-key.pressed[data-lane="1"] .key-letter { background:rgba(255,0,255,.25);  box-shadow:var(--glow-pink); }
  .lane-key.pressed[data-lane="2"] .key-letter { background:rgba(255,255,0,.25);  box-shadow:var(--glow-yellow); }
  .lane-key.pressed[data-lane="3"] .key-letter { background:rgba(0,255,136,.25);  box-shadow:var(--glow-green); }

  .hit-feedback {
    position:absolute; font-family:'Orbitron',sans-serif; font-size:20px; font-weight:900;
    pointer-events:none; animation:feedbackFloat .7s ease-out forwards; z-index:10; letter-spacing:.1em;
  }
  @keyframes feedbackFloat { 0%{opacity:1;transform:translateY(0) scale(1.2);} 100%{opacity:0;transform:translateY(-60px) scale(.8);} }

  /* Loading */
  #loadingOverlay {
    position:absolute; inset:0; background:rgba(5,5,16,.93);
    display:flex; flex-direction:column; align-items:center; justify-content:center; gap:16px; z-index:50;
  }
  #loadingOverlay.hidden { display:none; }
  .loading-text { font-size:15px; letter-spacing:.3em; color:var(--cyan); text-shadow:var(--glow-cyan); }
  .loading-bar-wrap { width:200px; height:4px; background:rgba(0,255,255,.1); border-radius:2px; overflow:hidden; }
  .loading-bar { height:100%; background:var(--cyan); box-shadow:var(--glow-cyan); width:0%; transition:width .25s; }

  /* ── GAME OVER ── */
  #gameOverScreen { gap:18px; }
  .over-title { font-size:clamp(36px,8vw,76px); font-weight:900; color:var(--pink); text-shadow:var(--glow-pink); letter-spacing:.2em; animation:flicker 2s infinite; }
  .final-score { display:flex; flex-direction:column; align-items:center; gap:4px; }
  .final-score-label { font-size:11px; letter-spacing:.4em; color:rgba(255,255,255,.4); font-family:'Share Tech Mono',monospace; }
  .final-score-value { font-size:60px; font-weight:900; color:white; text-shadow:0 0 30px rgba(255,255,255,.7); }
  .best-combo { font-size:15px; color:var(--yellow); text-shadow:var(--glow-yellow); font-family:'Share Tech Mono',monospace; letter-spacing:.2em; }
  /* ── PAUSE OVERLAY ── */
  #pauseOverlay {
    position:absolute; inset:0; z-index:40;
    background: rgba(5,5,16,0.85);
    display:flex; flex-direction:column; align-items:center; justify-content:center; gap:16px;
    animation: pauseFadeIn 0.15s ease forwards;
  }
  #pauseOverlay.hidden { display:none; }

  @keyframes pauseFadeIn {
    from { opacity:0; }
    to   { opacity:1; }
  }

  /* Glitch scanlines on pause */
  #pauseOverlay::before {
    content:'';
    position:absolute; inset:0;
    background: repeating-linear-gradient(
      0deg,
      transparent, transparent 3px,
      rgba(0,255,255,0.03) 3px, rgba(0,255,255,0.03) 4px
    );
    animation: scanMove 4s linear infinite;
    pointer-events:none;
  }
  @keyframes scanMove {
    from { background-position: 0 0; }
    to   { background-position: 0 100px; }
  }

  /* Glitch bars */
  #pauseOverlay::after {
    content:'';
    position:absolute; inset:0;
    background:
      linear-gradient(transparent 20%, rgba(0,255,255,0.04) 20.5%, transparent 21%),
      linear-gradient(transparent 55%, rgba(255,0,255,0.05) 55.5%, transparent 56%),
      linear-gradient(transparent 80%, rgba(0,255,255,0.03) 80.5%, transparent 81%);
    animation: glitchBars 2.5s steps(1) infinite;
    pointer-events:none;
  }
  @keyframes glitchBars {
    0%,100% { opacity:1; transform:translateX(0); }
    10%  { transform:translateX(-4px); opacity:0.8; }
    11%  { transform:translateX(4px); }
    12%  { transform:translateX(0); opacity:1; }
    45%  { transform:translateX(0); }
    46%  { transform:translateX(3px); opacity:0.7; }
    47%  { transform:translateX(-3px); }
    48%  { transform:translateX(0); opacity:1; }
    70%  { transform:translateX(0); }
    71%  { transform:translateX(-6px); opacity:0.6; }
    72%  { transform:translateX(6px); }
    73%  { transform:translateX(0); opacity:1; }
  }

  .pause-title {
    font-size: clamp(48px, 10vw, 80px); font-weight:900; letter-spacing:0.3em;
    background: linear-gradient(135deg, var(--cyan), var(--pink));
    -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text;
    filter: drop-shadow(0 0 30px rgba(0,255,255,0.6));
    position:relative; z-index:1;
    animation: glitchTitle 3s steps(1) infinite;
  }
  @keyframes glitchTitle {
    0%,100% { filter:drop-shadow(0 0 30px rgba(0,255,255,0.6)); transform:translate(0); }
    8%   { transform:translate(-3px, 1px); filter:drop-shadow(-3px 0 8px #ff00ff) drop-shadow(3px 0 8px #00ffff); }
    9%   { transform:translate(3px,-1px); }
    10%  { transform:translate(0); filter:drop-shadow(0 0 30px rgba(0,255,255,0.6)); }
    50%  { transform:translate(0); }
    51%  { transform:translate(4px, 0); filter:drop-shadow(-4px 0 10px #ff00ff); }
    52%  { transform:translate(-2px, 2px); filter:drop-shadow(4px 0 10px #00ffff); }
    53%  { transform:translate(0); filter:drop-shadow(0 0 30px rgba(0,255,255,0.6)); }
    80%  { transform:translate(0); }
    81%  { transform:translate(-5px, -1px); filter:drop-shadow(5px 0 12px #ff00ff) drop-shadow(-5px 0 12px #00ffff); }
    82%  { transform:translate(2px, 1px); }
    83%  { transform:translate(0); filter:drop-shadow(0 0 30px rgba(0,255,255,0.6)); }
  }

  .pause-hint {
    font-family:'Share Tech Mono',monospace; font-size:12px; letter-spacing:0.4em;
    color:rgba(255,255,255,0.4); position:relative; z-index:1;
    animation: glitchHint 4s steps(1) infinite;
  }
  @keyframes glitchHint {
    0%,100% { opacity:0.4; transform:translate(0); }
    30%  { opacity:0.4; }
    31%  { opacity:0.9; transform:translateX(2px); color:#00ffff; }
    32%  { opacity:0.4; transform:translateX(0); color:rgba(255,255,255,0.4); }
  }

  .pause-menu-btn {
    background:transparent; border:1px solid rgba(255,255,255,0.2); color:rgba(255,255,255,0.5);
    font-family:'Orbitron',sans-serif; font-size:13px; letter-spacing:0.2em;
    padding:10px 24px; cursor:pointer; margin-top:8px; transition:all 0.2s;
    position:relative; z-index:1;
  }
  .pause-menu-btn:hover { border-color:var(--pink); color:var(--pink); box-shadow:0 0 20px rgba(255,0,255,0.2); }

  .grade-badge { font-size:76px; font-weight:900; margin:-8px 0; }

  .over-btns { display:flex; gap:14px; margin-top:4px; }
  .over-btn {
    background:transparent; font-family:'Orbitron',sans-serif; font-size:14px; font-weight:700;
    letter-spacing:.2em; padding:12px 26px; cursor:pointer; transition:all .2s;

</style>
</head>

<script>
// ============================================================
// SONG LIBRARY
// ============================================================
const SONGS = [
  { name:'VOLTAGE IN MY VEINS', artist:'OG MONSTER', file:'Voltage_in_My_Veins.mp3', status:'ready' },
  { name:'RAVE FOREVER',        artist:'OG MONSTER', file:'Rave_Forever.mp3',         status:'wip' },
  { name:'SPLIT LITTLE MIND',   artist:'OG MONSTER', file:'Split_Little_Mind.mp3',    status:'wip' },
];

let selectedSong = 0;
let gamePaused  = false;
let pausedCtxTime = 0; // audioCtx.currentTime at moment of pause
let timingOffset = 0; // ms, negative = earlier, positive = later

// Build song list
const songList = document.getElementById('songList');
SONGS.forEach((s, i) => {
  const card = document.createElement('div');
  card.className = 'song-card' + (i === 0 ? ' selected' : '');
  card.innerHTML = `
    <div class="song-info">
      <div class="song-name">${s.name}</div>
      <div class="song-artist">${s.artist}</div>
    </div>
    <div style="display:flex;flex-direction:column;align-items:flex-end;gap:6px;">
      <span class="status-badge ${s.status === 'ready' ? 'status-ready' : 'status-wip'}">${s.status === 'ready' ? '✓ READY' : '⚙ WORK IN PROGRESS'}</span>
      <div class="song-num">${String(i+1).padStart(2,'0')}</div>
    </div>`;
  card.onclick = () => {
    selectedSong = i;
    document.querySelectorAll('.song-card').forEach((c,j) => c.classList.toggle('selected', j===i));
  };
  songList.appendChild(card);
});

function adjustOffset(delta) {
  timingOffset = Math.max(-500, Math.min(500, timingOffset + delta));
  document.getElementById('offsetDisplay').textContent = timingOffset + ' ms';
}

function updateBanner() {
  document.getElementById('bannerTitle').textContent = SONGS[selectedSong].name;
}

// ============================================================
// CONSTANTS
// ============================================================
const LANE_COLORS = ['#00ffff','#ff00ff','#ffff00','#00ff88'];
const LANE_KEYS   = ['d','f','j','k'];
const HIT_WINDOW  = 150;
const NOTE_SPEED  = 0.45;

// ============================================================
// GAME STATE
// ============================================================
let score        = 0;
let combo        = 0;
let bestCombo    = 0;
let health       = 100;
let gameRunning  = false;
let notes        = [];
let particles    = [];
let bgParticles  = [];
let pressedLanes = {};
let laneFlash    = [0,0,0,0];
let animId       = null;

// Audio
let audioCtx          = null;
let musicSource       = null;
let musicGain         = null;
let audioStartCtxTime = 0;

function getCtx() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  return audioCtx;
}
function getElapsedMs() {
  if (!audioCtx) return 0;
  return (audioCtx.currentTime - audioStartCtxTime) * 1000;
}

// ============================================================
// UI
// ============================================================
function showScreen(id) {
  const flash = document.getElementById('flashOverlay');
  flash.classList.remove('flash');
  void flash.offsetWidth;
  flash.classList.add('flash');

  const current = document.querySelector('.screen.active');
  const next = document.getElementById(id);

  if (current && current !== next) {
    current.classList.add('exiting');
    setTimeout(() => {
      current.classList.remove('active', 'exiting');
      next.classList.add('active', 'entering');
      setTimeout(() => next.classList.remove('entering'), 400);
    }, 220);
  } else {
    next.classList.add('active', 'entering');
    setTimeout(() => next.classList.remove('entering'), 400);
  }
}

function navigateToSite(url) {
  const overlay = document.getElementById('siteTransition');
  overlay.classList.remove('sweep-in', 'sweep-out');
  void overlay.offsetWidth;
  overlay.style.pointerEvents = 'all';
  overlay.classList.add('sweep-in');
  setTimeout(() => { window.location.href = url; }, 520);
}

// Call this on page load for enter-from-site animation
window.addEventListener('load', () => {
  const overlay = document.getElementById('siteTransition');
  overlay.style.opacity = '1';
  overlay.style.clipPath = 'inset(0 0% 0 0)';
  overlay.classList.add('sweep-out');
  setTimeout(() => {
    overlay.style.opacity = '';
    overlay.style.clipPath = '';
    overlay.style.pointerEvents = 'none';
  }, 550);
});

function selectDiff(d) {
  difficulty = d;
  document.querySelectorAll('.diff-btn').forEach((b,i) => b.classList.toggle('selected', i===d));
}

function goToMenu() {
  stopMusic();
  gameRunning = false;
  if (animId) { cancelAnimationFrame(animId); animId = null; }
  showScreen('menuScreen');
}

// ============================================================
// BEAT DETECTION
// ============================================================
async function analyzeBeats(arrayBuffer) {
  const ctx     = getCtx();
  const decoded = await ctx.decodeAudioData(arrayBuffer.slice(0));
  const sr      = decoded.sampleRate;
  const data    = decoded.getChannelData(0);

  const winSamp = Math.floor(sr * 0.01);
  const hop     = Math.floor(winSamp / 2);

  const energies = [];
  for (let i = 0; i + winSamp < data.length; i += hop) {
    let e = 0;
    for (let j = 0; j < winSamp; j++) e += data[i+j] * data[i+j];
    energies.push({ t:(i/sr)*1000, e:e/winSamp });
  }

  const W = 20;
  const smoothed = energies.map((en,i) => {
    const lo=Math.max(0,i-W), hi=Math.min(energies.length-1,i+W);
    let s=0; for (let k=lo;k<=hi;k++) s+=energies[k].e;
    return { t:en.t, e:s/(hi-lo+1) };
  });

  const cfg = [
    { mult:1.7,  minGap:320 },
    { mult:1.4,  minGap:220 },
    { mult:1.15, minGap:140 }
  ][difficulty];

  const beats = [];
  let lastT = -9999;
  const lb = 25;
  for (let i=lb; i<smoothed.length-lb; i++) {
    let local=0;
    for (let k=i-lb;k<=i+lb;k++) local+=energies[k].e;
    local/=(lb*2+1);
    if (energies[i].e > local*cfg.mult && smoothed[i].t - lastT > cfg.minGap) {
      beats.push(smoothed[i].t);
      lastT = smoothed[i].t;
    }
  }

  const pats = [
    [0,2,1,3,0,3,1,2],
    [0,1,2,3,1,0,3,2,0,2],
    [0,1,2,3,2,1,0,3,1,2,0,3]
  ];
  const pat = pats[difficulty];
  // Beat detection finds energy peaks which lag slightly behind actual beats.
  // Subtract ~80ms to compensate, so notes hit the zone exactly on the beat.
  const detectionLag = 80;
  const result = beats.map((t,i) => ({ time: t + 1500 - detectionLag + timingOffset, lane: pat[i%pat.length] }));

  if (difficulty===2) {
    const extras=[];
    result.forEach((n,i) => { if (i%6===0) extras.push({time:n.time,lane:(n.lane+2)%4}); });
    result.push(...extras);
    result.sort((a,b)=>a.time-b.time);
  }
  return result;
}

// ============================================================
// MUSIC
// ============================================================
function stopMusic() {
  if (musicSource) { try { musicSource.stop(); } catch(e){} musicSource=null; }
}

function playMusic(buffer) {
  const ctx = getCtx();
  stopMusic();
  musicGain = ctx.createGain();
  musicGain.gain.value = 0.6;
  musicGain.connect(ctx.destination);
  musicSource = ctx.createBufferSource();
  musicSource.buffer = buffer;
  musicSource.connect(musicGain);
  const leadIn = 1.5;
  musicSource.start(ctx.currentTime + leadIn);
  audioStartCtxTime = ctx.currentTime;
}

// ============================================================
// HIT SOUNDS
// ============================================================
function playHitSound(lane) {
  try {
    const ctx=getCtx(), osc=ctx.createOscillator(), g=ctx.createGain();
    osc.connect(g); g.connect(ctx.destination);
    const f=[440,554,659,880];
    osc.type='square';
    osc.frequency.setValueAtTime(f[lane],ctx.currentTime);
    osc.frequency.exponentialRampToValueAtTime(f[lane]*1.5,ctx.currentTime+.05);
    g.gain.setValueAtTime(.12,ctx.currentTime);
    g.gain.exponentialRampToValueAtTime(.001,ctx.currentTime+.12);
    osc.start(); osc.stop(ctx.currentTime+.12);
  } catch(e){}
}
function playMissSound() {
  try {
    const ctx=getCtx(), osc=ctx.createOscillator(), g=ctx.createGain();
    osc.connect(g); g.connect(ctx.destination);
    osc.type='sawtooth';
    osc.frequency.setValueAtTime(110,ctx.currentTime);
    osc.frequency.exponentialRampToValueAtTime(55,ctx.currentTime+.15);
    g.gain.setValueAtTime(.08,ctx.currentTime);
    g.gain.exponentialRampToValueAtTime(.001,ctx.currentTime+.15);
    osc.start(); osc.stop(ctx.currentTime+.15);
  } catch(e){}
}

// ============================================================
// START GAME
// ============================================================
async function startGame() {
  showScreen('gameScreen');
  gameRunning = false;
  if (animId) { cancelAnimationFrame(animId); animId=null; }

  const overlay = document.getElementById('loadingOverlay');
  const bar     = document.getElementById('loadingBar');
  overlay.classList.remove('hidden');
  bar.style.width = '5%';

  const ctx = getCtx();
  if (ctx.state==='suspended') await ctx.resume();
  bar.style.width = '15%';

  // Update now-playing title
  document.getElementById('nowPlayingTitle').textContent = SONGS[selectedSong].name;

  // Fetch & decode
  let rawBuffer=null, musicDecoded=null;
  try {
    const resp = await fetch(SONGS[selectedSong].file);
    if (resp.ok) {
      rawBuffer = await resp.arrayBuffer();
      bar.style.width = '45%';
      musicDecoded = await ctx.decodeAudioData(rawBuffer.slice(0));
      bar.style.width = '65%';
    }
  } catch(e){ console.warn('Audio load error:',e); }

  // Analyze beats
  let analyzedNotes = [];
  if (rawBuffer) {
    try { analyzedNotes = await analyzeBeats(rawBuffer); }
    catch(e){ console.warn('Beat analysis error:',e); }
  }
  bar.style.width = '85%';

  // Wait for canvas layout
  const canvas = document.getElementById('gameCanvas');
  const area   = document.getElementById('gameArea');
  await new Promise(resolve => {
    function check() {
      const r = area.getBoundingClientRect();
      if (r.width>0 && r.height>0) { canvas.width=Math.round(r.width); canvas.height=Math.round(r.height); resolve(); }
      else requestAnimationFrame(check);
    }
    check();
  });
  bar.style.width = '100%';
  await new Promise(r=>setTimeout(r,200));
  overlay.classList.add('hidden');

  // Reset state
  score=0; combo=0; bestCombo=0; health=100; gamePaused=false;
  pressedLanes={}; laneFlash=[0,0,0,0]; particles=[];
  notes = analyzedNotes.map(n=>({...n,hit:false,missed:false}));
  initBgParticles();
  updateHUD();

  if (musicDecoded) playMusic(musicDecoded);
  gameRunning = true;
  animId = requestAnimationFrame(gameLoop);
}

// ============================================================
// BG PARTICLES
// ============================================================
function initBgParticles() {
  const c = document.getElementById('gameCanvas');
  bgParticles = Array.from({length:28},()=>({
    x:Math.random()*c.width, y:Math.random()*c.height,
    size:Math.random()*2+.5, speed:Math.random()*.4+.15,
    color:LANE_COLORS[Math.floor(Math.random()*4)],
    alpha:Math.random()*.4+.1
  }));
}

// ============================================================
// GAME LOOP
// ============================================================
function gameLoop() {
  if (!gameRunning) return;
  const elapsed = getElapsedMs();

  notes.forEach(note => {
    if (!note.hit && !note.missed && elapsed > note.time+HIT_WINDOW) {
      note.missed=true; combo=0; health=Math.max(0,health-12);
      playMissSound(); spawnFeedback(note.lane,'MISS','#ff4444'); updateHUD();
    }
  });

  if (health<=0)                                                        { gameOver(false); return; }
  if (notes.length>0 && notes.every(n=>n.hit||n.missed) && elapsed>2000){ gameOver(true);  return; }

  draw(elapsed);
  animId = requestAnimationFrame(gameLoop);
}

// ============================================================
// DRAW
// ============================================================
function draw(elapsed) {
  const canvas=document.getElementById('gameCanvas');
  const ctx2=canvas.getContext('2d');
  const W=canvas.width, H=canvas.height, laneW=W/4, hitY=H-80;

  ctx2.clearRect(0,0,W,H);

  // BG particles
  bgParticles.forEach(p=>{
    p.y-=p.speed; if(p.y<0){p.y=H;p.x=Math.random()*W;}
    ctx2.globalAlpha=p.alpha; ctx2.fillStyle=p.color;
    ctx2.beginPath(); ctx2.arc(p.x,p.y,p.size,0,Math.PI*2); ctx2.fill();
  });
  ctx2.globalAlpha=1;

  // Lane separators
  ctx2.strokeStyle='rgba(255,255,255,.05)'; ctx2.lineWidth=1;
  for(let i=1;i<4;i++){ctx2.beginPath();ctx2.moveTo(i*laneW,0);ctx2.lineTo(i*laneW,H);ctx2.stroke();}

  // Lane flash
  laneFlash.forEach((f,i)=>{
    if(f<=0)return;
    const g=ctx2.createLinearGradient(i*laneW,0,(i+1)*laneW,0);
    const h=Math.floor(f*.25*255).toString(16).padStart(2,'0');
    g.addColorStop(0,'transparent'); g.addColorStop(.5,LANE_COLORS[i]+h); g.addColorStop(1,'transparent');
    ctx2.fillStyle=g; ctx2.fillRect(i*laneW,0,laneW,H);
    laneFlash[i]=Math.max(0,f-.06);
  });

  // Hit zone
  for(let i=0;i<4;i++){
    const cx=i*laneW+laneW/2, pressed=pressedLanes[LANE_KEYS[i]], r=pressed?20:15;
    const gr=ctx2.createRadialGradient(cx,hitY,0,cx,hitY,r*2);
    gr.addColorStop(0,LANE_COLORS[i]+(pressed?'88':'33')); gr.addColorStop(1,'transparent');
    ctx2.fillStyle=gr; ctx2.fillRect(i*laneW,hitY-r*2,laneW,r*4);
    ctx2.beginPath(); ctx2.arc(cx,hitY,r,0,Math.PI*2);
    ctx2.strokeStyle=LANE_COLORS[i]; ctx2.lineWidth=pressed?3:2;
    ctx2.globalAlpha=pressed?1:.5; ctx2.stroke(); ctx2.globalAlpha=1;
  }

  // Notes
  notes.forEach(note=>{
    if(note.hit||note.missed)return;
    const y=hitY-(note.time-elapsed)*NOTE_SPEED;
    if(y<-40||y>H+40)return;
    const color=LANE_COLORS[note.lane], nH=20, nW=laneW-12, nx=note.lane*laneW+6, ny=y-nH/2;
    ctx2.shadowBlur=18; ctx2.shadowColor=color; ctx2.fillStyle=color; ctx2.globalAlpha=.9;
    rr(ctx2,nx,ny,nW,nH,5); ctx2.fill();
    const sh=ctx2.createLinearGradient(nx,ny,nx,ny+nH);
    sh.addColorStop(0,'rgba(255,255,255,.4)'); sh.addColorStop(1,'rgba(255,255,255,0)');
    ctx2.fillStyle=sh; rr(ctx2,nx,ny,nW,nH/2,5); ctx2.fill();
    ctx2.globalAlpha=1; ctx2.shadowBlur=0;
  });

  // Particles
  particles=particles.filter(p=>p.life>0);
  particles.forEach(p=>{
    ctx2.globalAlpha=p.life; ctx2.fillStyle=p.color;
    ctx2.shadowBlur=8; ctx2.shadowColor=p.color;
    ctx2.beginPath(); ctx2.arc(p.x,p.y,p.size,0,Math.PI*2); ctx2.fill();
    p.x+=p.vx; p.y+=p.vy; p.vy+=.08; p.size*=.95; p.life-=.035;
  });
  ctx2.globalAlpha=1; ctx2.shadowBlur=0;
}

function rr(ctx,x,y,w,h,r){
  ctx.beginPath();
  ctx.moveTo(x+r,y); ctx.lineTo(x+w-r,y); ctx.quadraticCurveTo(x+w,y,x+w,y+r);
  ctx.lineTo(x+w,y+h-r); ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);
  ctx.lineTo(x+r,y+h); ctx.quadraticCurveTo(x,y+h,x,y+h-r);
  ctx.lineTo(x,y+r); ctx.quadraticCurveTo(x,y,x+r,y); ctx.closePath();
}

// ============================================================
// HIT HANDLING
// ============================================================
function handleHit(lane) {
  if (!gameRunning) return;
  const elapsed=getElapsedMs();
  let closest=null, minDist=Infinity;
  notes.forEach(note=>{
    if(note.hit||note.missed||note.lane!==lane)return;
    const d=Math.abs(note.time-elapsed);
    if(d<minDist&&d<=HIT_WINDOW){minDist=d;closest=note;}
  });
  if(!closest)return;
  closest.hit=true;
  if(minDist<55){
    score+=300+combo*2; combo++; health=Math.min(100,health+3);
    spawnFeedback(lane,'PERFECT',LANE_COLORS[lane]); spawnBurst(lane,1);
  } else {
    score+=100+combo; combo++; health=Math.min(100,health+1);
    spawnFeedback(lane,'GOOD','#aaaaff'); spawnBurst(lane,.5);
  }
  if(combo>bestCombo)bestCombo=combo;
  laneFlash[lane]=1; playHitSound(lane); updateHUD();
}

function spawnFeedback(lane,text,color){
  const area=document.getElementById('gameArea'), laneW=area.offsetWidth/4;
  const el=document.createElement('div');
  el.className='hit-feedback'; el.textContent=text;
  el.style.color=color; el.style.textShadow=`0 0 15px ${color}`;
  el.style.left=(lane*laneW+laneW/2-45)+'px'; el.style.bottom='95px';
  el.style.width='90px'; el.style.textAlign='center';
  area.appendChild(el); setTimeout(()=>el.remove(),700);
}

function spawnBurst(lane,scale=1){
  const c=document.getElementById('gameCanvas'), laneW=c.width/4;
  const cx=lane*laneW+laneW/2, cy=c.height-80, color=LANE_COLORS[lane], count=Math.floor(16*scale);
  for(let i=0;i<count;i++){
    const a=(Math.PI*2*i)/count, sp=(Math.random()*3+1.5)*scale;
    particles.push({x:cx,y:cy,vx:Math.cos(a)*sp,vy:Math.sin(a)*sp-2,size:Math.random()*4+2,color,life:1});
  }
}

function updateHUD(){
  document.getElementById('scoreVal').textContent=String(score).padStart(6,'0');
  document.getElementById('healthFill').style.width=health+'%';
  const cv=document.getElementById('comboVal');
  cv.textContent=combo+'x'; cv.style.animation='none';
  void cv.offsetWidth; cv.style.animation='comboPulse .3s ease-out';
}

// ============================================================
// GAME OVER
// ============================================================
function gameOver(cleared=false){
  gameRunning=false;
  if(animId){cancelAnimationFrame(animId);animId=null;}
  stopMusic();
  document.getElementById('finalScore').textContent=String(score).padStart(6,'0');
  document.getElementById('bestComboShow').textContent=`BEST COMBO: ${bestCombo}x`;
  const hit=notes.filter(n=>n.hit).length, pct=notes.length>0?hit/notes.length:0;
  let grade,color;
  if(pct>=.95){grade='S';color='#ffff00';}
  else if(pct>=.85){grade='A';color='#00ff88';}
  else if(pct>=.70){grade='B';color='#00ffff';}
  else if(pct>=.55){grade='C';color='#ff00ff';}
  else{grade='F';color='#ff4444';}
  const badge=document.getElementById('gradeBadge');
  badge.textContent=grade; badge.style.color=color; badge.style.textShadow=`0 0 20px ${color},0 0 40px ${color}`;
  const title=document.getElementById('overTitle');
  if(cleared){title.textContent='CLEARED!';title.style.color='#00ffff';title.style.textShadow='0 0 20px #00ffff,0 0 40px #00ffff';}
  else{title.textContent='GAME OVER';title.style.color='#ff00ff';title.style.textShadow='0 0 20px #ff00ff,0 0 40px #ff00ff';}
  setTimeout(()=>showScreen('gameOverScreen'),400);
}

// ============================================================
// INPUT
// ============================================================
function pauseGame() {
  if (!gameRunning || gamePaused) return;
  gamePaused = true;
  pausedCtxTime = audioCtx ? audioCtx.currentTime : 0;
  if (animId) { cancelAnimationFrame(animId); animId = null; }
  // Pause music by suspending audio context
  if (audioCtx) audioCtx.suspend();
  document.getElementById('pauseOverlay').classList.remove('hidden');
}

function resumeGame() {
  if (!gamePaused) return;
  gamePaused = false;
  document.getElementById('pauseOverlay').classList.add('hidden');
  if (audioCtx) audioCtx.resume();
  animId = requestAnimationFrame(gameLoop);
}

function togglePause() {
  if (!gameRunning) return;
  gamePaused ? resumeGame() : pauseGame();
}

document.addEventListener('keydown', e=>{
  if (e.key === 'Escape') { if (gameRunning) togglePause(); return; }
  const key=e.key.toLowerCase();
  if(!LANE_KEYS.includes(key)||pressedLanes[key])return;
  pressedLanes[key]=true;
  const lane=LANE_KEYS.indexOf(key);
  document.getElementById('lk'+lane)?.classList.add('pressed');
  if(gameRunning && !gamePaused)handleHit(lane);
});
document.addEventListener('keyup', e=>{
  const key=e.key.toLowerCase();
  pressedLanes[key]=false;
  const lane=LANE_KEYS.indexOf(key);
  if(lane>=0)document.getElementById('lk'+lane)?.classList.remove('pressed');
});
document.querySelectorAll('.lane-key').forEach(el=>{
  el.addEventListener('pointerdown',()=>{
    const lane=parseInt(el.dataset.lane);
    el.classList.add('pressed');
    if(gameRunning)handleHit(lane);
  });
  el.addEventListener('pointerup',   ()=>el.classList.remove('pressed'));
  el.addEventListener('pointerleave',()=>el.classList.remove('pressed'));
});
window.addEventListener('resize',()=>{
  if(!gameRunning)return;
  const canvas=document.getElementById('gameCanvas'), area=document.getElementById('gameArea');
  const r=area.getBoundingClientRect();
  if(r.width>0){canvas.width=Math.round(r.width);canvas.height=Math.round(r.height);initBgParticles();}
});
</script>
