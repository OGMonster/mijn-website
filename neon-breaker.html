<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NEON BREAKER — OG Monster</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Orbitron:wght@700;900&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root {
    --cyan:   #00ffff;
    --pink:   #ff2d78;
    --yellow: #ffe600;
    --green:  #00ff88;
    --purple: #cc44ff;
    --bg:     #030a1a;
    --glow-cyan:   0 0 20px rgba(0,255,255,.8);
    --glow-pink:   0 0 20px rgba(255,45,120,.8);
    --glow-green:  0 0 20px rgba(0,255,136,.8);
    --glow-yellow: 0 0 20px rgba(255,230,0,.8);
    --muted: rgba(180,200,230,.5);
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: #e0eeff;
    font-family: 'Space Mono', monospace;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    overflow: hidden;
    user-select: none;
  }

  nav {
    width: 100%; display: flex; justify-content: space-between; align-items: center;
    padding: .6rem 1.5rem;
    border-bottom: 1px solid rgba(0,255,255,.08);
    background: rgba(3,10,26,.9);
    position: fixed; top: 0; z-index: 100;
  }
  nav a { color: var(--cyan); text-decoration: none; font-family: 'Bebas Neue', sans-serif;
    font-size: 1.1rem; letter-spacing: 3px; transition: text-shadow .2s; }
  nav a:hover { text-shadow: var(--glow-cyan); }

  .game-wrapper {
    display: flex;
    flex-direction: column;
    align-items: center;
    padding-top: 52px;
    width: 100%;
    height: 100vh;
  }

  h1 {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 2rem; letter-spacing: 6px;
    color: var(--pink); text-shadow: var(--glow-pink);
    margin: .4rem 0 .2rem;
  }
  h1 span { color: var(--cyan); text-shadow: var(--glow-cyan); }

  /* ── SCOREBOARD ── */
  .scoreboard {
    display: flex; gap: 2rem; margin-bottom: .3rem;
  }
  .score-item { text-align: center; }
  .score-label { font-size: .55rem; letter-spacing: 3px; color: var(--muted); }
  .score-value { font-size: 1.3rem; color: var(--cyan); text-shadow: var(--glow-cyan); font-family: 'Orbitron', sans-serif; }

  /* ── CANVAS ── */
  .canvas-container {
    position: relative;
    border: 1px solid rgba(0,255,255,.15);
    box-shadow: 0 0 40px rgba(0,255,255,.06), inset 0 0 60px rgba(0,0,0,.5);
  }
  #gameCanvas { display: block; background: var(--bg); cursor: none; }

  /* ── LIVES ── */
  .lives-row {
    display: flex; gap: .5rem; margin-top: .3rem; align-items: center;
  }
  .lives-label { font-size: .55rem; letter-spacing: 3px; color: var(--muted); margin-right: .2rem; }
  .life-pip {
    width: 10px; height: 10px; border-radius: 50%;
    background: var(--pink); box-shadow: var(--glow-pink);
    transition: all .3s;
  }
  .life-pip.lost { background: rgba(255,45,120,.15); box-shadow: none; }

  /* ── OVERLAY ── */
  #overlay {
    position: absolute; inset: 0;
    background: rgba(3,10,26,.88);
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    gap: 1rem; z-index: 10;
  }
  #overlay h2 {
    font-family: 'Bebas Neue', sans-serif; font-size: 2.8rem;
    letter-spacing: 4px; color: var(--pink); text-shadow: var(--glow-pink);
  }
  #overlay p { color: var(--muted); font-size: .8rem; letter-spacing: 1px; text-align: center; padding: 0 1rem; }
  #overlay .final-score {
    font-family: 'Orbitron', sans-serif; font-size: 1.8rem;
    color: var(--yellow); text-shadow: var(--glow-yellow);
  }

  .btn {
    font-family: 'Bebas Neue', sans-serif; font-size: 1.1rem;
    letter-spacing: 3px; padding: .6rem 2rem;
    background: transparent; border: 2px solid var(--cyan);
    color: var(--cyan); cursor: pointer;
    transition: all .2s;
  }
  .btn:hover { background: rgba(0,255,255,.1); box-shadow: var(--glow-cyan); }
  .btn-secondary {
    border-color: rgba(106,158,207,.35); color: var(--muted);
    font-family: 'Space Mono', monospace; font-size: .65rem;
    letter-spacing: 2px; padding: .35rem 1rem; border-width: 1px;
  }
  .btn-secondary:hover { border-color: var(--cyan); color: var(--cyan); box-shadow: 0 0 15px rgba(0,255,255,.3); }

  /* ── POWERUP INDICATOR BAR ── */
  #powerupBar {
    display: flex; gap: .4rem; margin-top: .3rem; min-height: 22px; align-items: center;
  }
  .pu-tag {
    font-family: 'Space Mono', monospace; font-size: .5rem; letter-spacing: 1px;
    padding: 2px 7px; border: 1px solid; border-radius: 2px;
    position: relative; overflow: hidden;
  }
  .pu-tag-fill {
    position: absolute; inset: 0; opacity: .18; transform-origin: left;
    transition: transform .1s linear;
  }

  /* ── PAUSE MENU ── */
  #pauseMenu {
    display: none; position: absolute; inset: 0;
    background: rgba(3,5,16,.88); backdrop-filter: blur(6px);
    z-index: 20; align-items: center; justify-content: center;
  }
  #pauseMenu.active { display: flex; animation: pmFade .2s ease; }
  @keyframes pmFade { from { opacity:0; transform:scale(.97); } to { opacity:1; transform:scale(1); } }
  .pm-box {
    display: flex; flex-direction: column; align-items: center; gap: 16px;
    border: 1px solid rgba(0,255,255,.2); background: rgba(0,10,30,.85);
    padding: 32px 44px; min-width: 240px;
    box-shadow: 0 0 60px rgba(0,255,255,.08);
  }
  .pm-title { font-family: 'Orbitron', sans-serif; font-size: 20px;
    letter-spacing: .4em; color: var(--cyan); text-shadow: var(--glow-cyan); }
  .pm-divider { width: 100%; height: 1px; background: rgba(0,255,255,.15); }
  .pm-stats { display: flex; gap: 32px; }
  .pm-stat { display: flex; flex-direction: column; align-items: center; gap: 3px; }
  .pm-stat-val { font-family: 'Orbitron', sans-serif; font-size: 18px;
    color: var(--cyan); text-shadow: 0 0 10px var(--cyan); }
  .pm-stat-label { font-size: 9px; letter-spacing: .2em; color: rgba(255,255,255,.35); }
  .pm-btns { display: flex; flex-direction: column; gap: 8px; width: 100%; }
  .pm-btn {
    background: transparent; font-family: 'Orbitron', sans-serif;
    font-size: 11px; letter-spacing: .25em; padding: 11px 0;
    cursor: pointer; transition: all .2s; width: 100%; border: 1px solid;
  }
  .pm-resume { border-color: var(--cyan);   color: var(--cyan); }
  .pm-retry  { border-color: var(--yellow); color: var(--yellow); }
  .pm-exit   { border-color: rgba(255,255,255,.2); color: rgba(255,255,255,.4); }
  .pm-resume:hover { background: rgba(0,255,255,.1);  box-shadow: 0 0 20px rgba(0,255,255,.3); }
  .pm-retry:hover  { background: rgba(255,255,0,.07); box-shadow: 0 0 20px rgba(255,255,0,.25); }
  .pm-exit:hover   { background: rgba(255,255,255,.05); border-color: white; color: white; }
  .pm-hint { font-size: 9px; color: rgba(255,255,255,.2); letter-spacing: .15em; }

  /* ── LEVEL BANNER ── */
  #levelBanner {
    position: absolute; inset: 0; pointer-events: none; z-index: 15;
    display: flex; align-items: center; justify-content: center;
    opacity: 0;
  }
  #levelBanner.show { animation: lbPop .9s ease forwards; }
  @keyframes lbPop {
    0%   { opacity:0; transform:scale(.8); }
    20%  { opacity:1; transform:scale(1.05); }
    70%  { opacity:1; transform:scale(1); }
    100% { opacity:0; transform:scale(.95); }
  }
  #levelBanner span {
    font-family: 'Bebas Neue', sans-serif; font-size: 3rem;
    letter-spacing: 8px; color: var(--yellow);
    text-shadow: 0 0 30px var(--yellow), 0 0 60px rgba(255,230,0,.4);
  }

  .hint { font-size: .55rem; letter-spacing: 2px; color: rgba(180,200,230,.3); margin-top: .3rem; }

  /* ── PAUSE BTN ── */
  #pauseBtn {
    position: absolute; top: 8px; right: 10px; z-index: 12;
    background: transparent; border: 1px solid rgba(0,255,255,.2);
    color: rgba(0,255,255,.4); font-size: 13px; padding: 3px 9px;
    cursor: pointer; font-family: 'Space Mono', monospace; letter-spacing: 2px;
    transition: all .2s;
  }
  #pauseBtn:hover { border-color: var(--cyan); color: var(--cyan); box-shadow: 0 0 12px rgba(0,255,255,.3); }
</style>
</head>
<body>

<nav>
  <a href="index.html" class="logo">OG Monster</a>
  <a href="index.html">← Back</a>
</nav>

<div class="game-wrapper">
  <h1>NEON <span>BREAKER</span></h1>

  <div class="scoreboard">
    <div class="score-item">
      <div class="score-label">SCORE</div>
      <div class="score-value" id="scoreDisplay">0</div>
    </div>
    <div class="score-item">
      <div class="score-label">BEST</div>
      <div class="score-value" id="highScoreDisplay">0</div>
    </div>
    <div class="score-item">
      <div class="score-label">LEVEL</div>
      <div class="score-value" id="levelDisplay">1</div>
    </div>
  </div>

  <div class="canvas-container">
    <canvas id="gameCanvas" width="420" height="500"></canvas>
    <button id="pauseBtn" onclick="togglePause()">&#9646;&#9646;</button>

    <!-- OVERLAY -->
    <div id="overlay">
      <h2 id="overlayTitle">NEON BREAKER</h2>
      <p id="overlayMsg">Break the blocks. Don't drop the ball.</p>
      <div class="final-score" id="overlayScore" style="display:none"></div>
      <button class="btn" id="startBtn">START GAME</button>
      <button id="menuBtn" class="btn-secondary" style="display:none" onclick="goToMainMenu()">⌂ Main Menu</button>
    </div>

    <!-- PAUSE -->
    <div id="pauseMenu">
      <div class="pm-box">
        <div class="pm-title">PAUSED</div>
        <div class="pm-divider"></div>
        <div class="pm-stats">
          <div class="pm-stat">
            <div class="pm-stat-val" id="pmScore">0</div>
            <div class="pm-stat-label">SCORE</div>
          </div>
          <div class="pm-stat">
            <div class="pm-stat-val" id="pmLevel">1</div>
            <div class="pm-stat-label">LEVEL</div>
          </div>
        </div>
        <div class="pm-divider"></div>
        <div class="pm-btns">
          <button class="pm-btn pm-resume" onclick="togglePause()">▶ RESUME</button>
          <button class="pm-btn pm-retry"  onclick="pmRetry()">↺ RETRY</button>
          <button class="pm-btn pm-exit"   onclick="pmExit()">↩ MENU</button>
        </div>
        <div class="pm-hint">ESC to resume</div>
      </div>
    </div>

    <!-- LEVEL BANNER -->
    <div id="levelBanner"><span id="levelBannerText">LEVEL 2</span></div>
  </div>

  <div class="lives-row">
    <span class="lives-label">LIVES</span>
    <div class="life-pip" id="life0"></div>
    <div class="life-pip" id="life1"></div>
    <div class="life-pip" id="life2"></div>
  </div>
  <div id="powerupBar"></div>

  <p class="hint">Move mouse or ← → to control paddle · ESC to pause</p>
  <a href="index.html" class="hint" style="margin-top:.2rem;color:rgba(0,255,255,.3);text-decoration:none;">← Back to OG Monster</a>
</div>

<script>
// ============================================================
// CANVAS / CONSTANTS
// ============================================================
const canvas = document.getElementById('gameCanvas');
const ctx    = canvas.getContext('2d');
const W = canvas.width, H = canvas.height;

const PADDLE_W  = 72, PADDLE_H = 10, PADDLE_Y = H - 30;
const BALL_R    = 7;
const COLS = 7, ROWS = 6;
const BRICK_W   = Math.floor((W - 40) / COLS);
const BRICK_H   = 18;
const BRICK_PAD = 4;
const BRICK_OFF_X = 20;
const BRICK_OFF_Y = 55;
const FPS = 60;
const POWERUP_DURATION = 30 * FPS; // 30 seconds in frames

const BRICK_COLORS = [
  { color: '#ff2d78', glow: 'rgba(255,45,120,.8)',  pts: 50 },
  { color: '#cc44ff', glow: 'rgba(204,68,255,.8)',  pts: 40 },
  { color: '#00b4ff', glow: 'rgba(0,180,255,.8)',   pts: 30 },
  { color: '#00ff88', glow: 'rgba(0,255,136,.8)',   pts: 20 },
  { color: '#ffe600', glow: 'rgba(255,230,0,.8)',   pts: 10 },
  { color: '#00ffff', glow: 'rgba(0,255,255,.8)',   pts: 15 },
];

// ============================================================
// POWERUP TYPES
// ============================================================
const POWERUP_TYPES = [
  { id: 'wide',   label: 'WIDE',   color: '#00ffff', timed: true,  desc: 'Wider paddle 30s'    },
  { id: 'multi',  label: '2-BALL', color: '#ff2d78', timed: false, desc: 'Extra ball'           },
  { id: 'slow',   label: 'SLOW',   color: '#00ff88', timed: true,  desc: 'Slow ball 30s'        },
  { id: 'laser',  label: 'LASER',  color: '#ffe600', timed: false, desc: '10-shot laser burst!'  },
  { id: 'shield', label: 'SHIELD', color: '#cc44ff', timed: true,  desc: 'Bottom shield 30s'    },
];

// ============================================================
// GAME STATE
// ============================================================
let paddle, balls, bricks, particles, powerUps, lasers, pendingLaserShots;
let score, highScore, lives, level, gameRunning, paused_, pulseTick;
let paddleTarget = W / 2;
let keys = {};
let activeEffects = {}; // { id: framesRemaining }

highScore = parseInt(localStorage.getItem('ogBreakerHigh') || '0');
document.getElementById('highScoreDisplay').textContent = highScore;

// ============================================================
// INIT
// ============================================================
function init() {
  paddle = { x: W / 2 - PADDLE_W / 2, w: PADDLE_W };
  balls  = [makeBall()];
  bricks = makeBricks();
  particles = []; powerUps = []; lasers = []; pendingLaserShots = [];
  score = 0; lives = 3; level = 1; pulseTick = 0;
  activeEffects = {};
  updateHUD(); updateLives(); renderEffectBar();
}

function makeBall(x, y, vx, vy) {
  const spd = 4 + (level - 1) * 0.3;
  return {
    x:  x  ?? W / 2,
    y:  y  ?? PADDLE_Y - BALL_R - 2,
    vx: vx ?? (Math.random() > .5 ? spd : -spd) * 0.7,
    vy: vy ?? -spd,
    trail: [],
    extra: false,
  };
}

function makeBricks() {
  const arr = [];
  for (let r = 0; r < ROWS; r++) {
    for (let c = 0; c < COLS; c++) {
      const ci = (ROWS - 1 - r) % BRICK_COLORS.length;
      arr.push({
        x: BRICK_OFF_X + c * (BRICK_W + BRICK_PAD),
        y: BRICK_OFF_Y + r * (BRICK_H + BRICK_PAD),
        w: BRICK_W - BRICK_PAD, h: BRICK_H,
        color: BRICK_COLORS[ci].color, glow: BRICK_COLORS[ci].glow,
        pts: BRICK_COLORS[ci].pts * level,
        alive: true, hp: r < 2 ? 2 : 1,
        pulse: Math.random() * Math.PI * 2, flashTimer: 0,
      });
    }
  }
  return arr;
}

// ============================================================
// ACTIVE EFFECTS / POWERUP BAR
// ============================================================
function activateEffect(id) {
  const type = POWERUP_TYPES.find(t => t.id === id);
  if (!type) return;
  if (type.timed) {
    activeEffects[id] = POWERUP_DURATION;
  }
  // Laser: fire a burst of 10 shots spread over 2 seconds
  if (id === 'laser') {
    for (let i = 0; i < 10; i++) {
      const delay = i * Math.floor(2 * FPS / 10);
      pendingLaserShots.push({ frame: pulseTick + delay });
    }
  }
  renderEffectBar();
}

function tickEffects() {
  let changed = false;
  for (const id in activeEffects) {
    activeEffects[id]--;
    if (activeEffects[id] <= 0) {
      delete activeEffects[id];
      expireEffect(id);
      changed = true;
    }
  }
  if (changed) renderEffectBar();
  // Update bar fill every frame
  document.querySelectorAll('.pu-tag').forEach(el => {
    const id = el.dataset.id;
    if (activeEffects[id] !== undefined) {
      const pct = activeEffects[id] / POWERUP_DURATION;
      el.querySelector('.pu-tag-fill').style.transform = `scaleX(${pct})`;
    }
  });
}

function expireEffect(id) {
  if (id === 'wide')  paddle.w = PADDLE_W;
  if (id === 'slow')  balls.forEach(b => { const spd = 4 + (level-1)*0.3; const cur = Math.sqrt(b.vx*b.vx+b.vy*b.vy); if (cur > 0) { b.vx = b.vx/cur*spd; b.vy = b.vy/cur*spd; } });
  if (id === 'laser') lasers = [];
  renderEffectBar();
}

function renderEffectBar() {
  const bar = document.getElementById('powerupBar');
  bar.innerHTML = '';
  for (const id in activeEffects) {
    const type = POWERUP_TYPES.find(t => t.id === id);
    if (!type) continue;
    const tag = document.createElement('div');
    tag.className = 'pu-tag'; tag.dataset.id = id;
    tag.style.borderColor = type.color; tag.style.color = type.color;
    tag.innerHTML = `<div class="pu-tag-fill" style="background:${type.color}"></div>${type.label}`;
    bar.appendChild(tag);
  }
}

// ============================================================
// HUD
// ============================================================
function updateHUD() {
  document.getElementById('scoreDisplay').textContent = score;
  document.getElementById('levelDisplay').textContent = level;
  if (score > highScore) {
    highScore = score;
    localStorage.setItem('ogBreakerHigh', highScore);
    document.getElementById('highScoreDisplay').textContent = highScore;
  }
}
function updateLives() {
  for (let i = 0; i < 3; i++)
    document.getElementById('life' + i).classList.toggle('lost', i >= lives);
}

// ============================================================
// PARTICLES
// ============================================================
function spawnBurst(x, y, color, count = 14) {
  for (let i = 0; i < count; i++) {
    const a = (Math.PI * 2 * i) / count + Math.random() * 0.5;
    const sp = Math.random() * 4 + 1.5;
    particles.push({ x, y, vx: Math.cos(a)*sp, vy: Math.sin(a)*sp-1, size: Math.random()*4+2, color, life:1, decay: Math.random()*.04+.025 });
  }
}
function updateParticles() {
  for (let i = particles.length-1; i >= 0; i--) {
    const p = particles[i];
    p.x += p.vx; p.y += p.vy; p.vy += .08; p.life -= p.decay;
    if (p.life <= 0) particles.splice(i, 1);
  }
}
function drawParticles() {
  particles.forEach(p => {
    ctx.save(); ctx.globalAlpha = p.life;
    ctx.shadowBlur = 10; ctx.shadowColor = p.color; ctx.fillStyle = p.color;
    ctx.beginPath(); ctx.arc(p.x, p.y, p.size*p.life, 0, Math.PI*2); ctx.fill();
    ctx.restore();
  });
}

// ============================================================
// FALLING POWERUP CAPSULES
// ============================================================
function spawnPowerUp(x, y) {
  if (Math.random() > 0.25) return;
  const type = POWERUP_TYPES[Math.floor(Math.random() * POWERUP_TYPES.length)];
  powerUps.push({ x, y, vy: 1.6, type, r: 11 });
}

function updatePowerUps() {
  for (let i = powerUps.length-1; i >= 0; i--) {
    const p = powerUps[i];
    p.y += p.vy;
    if (p.y + p.r >= PADDLE_Y && p.y - p.r <= PADDLE_Y + PADDLE_H &&
        p.x >= paddle.x && p.x <= paddle.x + paddle.w) {
      collectPowerUp(p.type);
      spawnBurst(p.x, p.y, p.type.color, 8);
      powerUps.splice(i, 1);
    } else if (p.y > H + 20) powerUps.splice(i, 1);
  }
}

function collectPowerUp(type) {
  activateEffect(type.id);
  if (type.id === 'wide') {
    paddle.w = PADDLE_W * 1.7;
  } else if (type.id === 'multi') {
    const b = balls[0] || makeBall();
    const nb = makeBall(b.x, b.y, -b.vx * 0.9, b.vy);
    nb.extra = true;
    balls.push(nb);
  } else if (type.id === 'slow') {
    balls.forEach(b => { b.vx *= 0.6; b.vy *= 0.6; });
  }
  // laser and shield are passive — checked in update/draw
}

function drawPowerUps() {
  powerUps.forEach(p => {
    ctx.save();
    ctx.shadowBlur = 16; ctx.shadowColor = p.type.color;
    ctx.strokeStyle = p.type.color; ctx.lineWidth = 2;
    // Capsule shape
    roundRect2(p.x - p.r, p.y - p.r * 0.6, p.r * 2, p.r * 1.2, 5);
    ctx.stroke();
    ctx.fillStyle = p.type.color; ctx.globalAlpha = .12;
    roundRect2(p.x - p.r, p.y - p.r * 0.6, p.r * 2, p.r * 1.2, 5);
    ctx.fill();
    ctx.globalAlpha = 1;
    ctx.fillStyle = p.type.color;
    ctx.font = 'bold 6px monospace'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.fillText(p.type.label, p.x, p.y);
    ctx.restore();
  });
}

// ============================================================
// LASERS
// ============================================================
function fireLasers() {
  // Fire any pending burst shots when their scheduled frame arrives
  for (let i = pendingLaserShots.length - 1; i >= 0; i--) {
    if (pulseTick >= pendingLaserShots[i].frame) {
      lasers.push({ x: paddle.x + 6,            y: PADDLE_Y, vy: -10 });
      lasers.push({ x: paddle.x + paddle.w - 6, y: PADDLE_Y, vy: -10 });
      pendingLaserShots.splice(i, 1);
    }
  }
}

function updateLasers() {
  for (let i = lasers.length-1; i >= 0; i--) {
    const l = lasers[i];
    l.y += l.vy;
    if (l.y < -10) { lasers.splice(i, 1); continue; }
    // Check brick collision
    for (const br of bricks) {
      if (!br.alive) continue;
      if (l.x >= br.x && l.x <= br.x + br.w && l.y >= br.y && l.y <= br.y + br.h) {
        br.hp--;
        if (br.hp <= 0) {
          br.alive = false;
          score += br.pts; updateHUD();
          spawnBurst(br.x + br.w/2, br.y + br.h/2, br.color, 8);
          spawnPowerUp(br.x + br.w/2, br.y + br.h/2);
        } else { br.flashTimer = 6; }
        lasers.splice(i, 1);
        break;
      }
    }
  }
}

function drawLasers() {
  if (!lasers.length) return;
  lasers.forEach(l => {
    ctx.save();
    ctx.shadowBlur = 14; ctx.shadowColor = '#ffe600';
    ctx.strokeStyle = '#ffe600'; ctx.lineWidth = 2;
    ctx.beginPath(); ctx.moveTo(l.x, l.y); ctx.lineTo(l.x, l.y + 14); ctx.stroke();
    ctx.restore();
  });
}

// ============================================================
// SHIELD
// ============================================================
function drawShield() {
  if (!activeEffects['shield']) return;
  const alpha = Math.min(activeEffects['shield'] / (FPS * 5), 0.7);
  ctx.save();
  ctx.shadowBlur = 18; ctx.shadowColor = '#cc44ff';
  ctx.strokeStyle = `rgba(204,68,255,${alpha})`;
  ctx.lineWidth = 3;
  ctx.beginPath(); ctx.moveTo(0, H - 4); ctx.lineTo(W, H - 4); ctx.stroke();
  ctx.restore();
}

// ============================================================
// COLLISION
// ============================================================
function ballBrickCollision(b) {
  for (const br of bricks) {
    if (!br.alive) continue;
    const nx = Math.max(br.x, Math.min(b.x, br.x + br.w));
    const ny = Math.max(br.y, Math.min(b.y, br.y + br.h));
    const dx = b.x - nx, dy = b.y - ny;
    if (dx*dx + dy*dy < BALL_R*BALL_R) {
      br.hp--;
      if (br.hp <= 0) {
        br.alive = false;
        score += br.pts; updateHUD();
        spawnBurst(br.x + br.w/2, br.y + br.h/2, br.color);
        spawnPowerUp(br.x + br.w/2, br.y + br.h/2);
      } else { br.flashTimer = 8; spawnBurst(nx, ny, br.color, 5); }
      if (Math.abs(dx) > Math.abs(dy)) b.vx = Math.abs(b.vx) * Math.sign(dx);
      else                              b.vy = Math.abs(b.vy) * Math.sign(dy);
      return;
    }
  }
}

function ballPaddleCollision(b) {
  if (b.vy > 0 &&
      b.y + BALL_R >= PADDLE_Y &&
      b.y - BALL_R <= PADDLE_Y + PADDLE_H &&
      b.x >= paddle.x - 4 &&
      b.x <= paddle.x + paddle.w + 4) {
    const rel = (b.x - (paddle.x + paddle.w/2)) / (paddle.w/2);
    const angle = rel * 65 * (Math.PI/180);
    const spd = Math.sqrt(b.vx*b.vx + b.vy*b.vy);
    b.vx = spd * Math.sin(angle);
    b.vy = -Math.abs(spd * Math.cos(angle));
    b.y  = PADDLE_Y - BALL_R - 1;
    spawnBurst(b.x, PADDLE_Y, '#00ffff', 6);
  }
}

// ============================================================
// DRAW
// ============================================================
function drawGrid() {
  ctx.strokeStyle = 'rgba(0,180,255,0.03)'; ctx.lineWidth = 1;
  for (let x = 0; x < W; x += 20) { ctx.beginPath(); ctx.moveTo(x,0); ctx.lineTo(x,H); ctx.stroke(); }
  for (let y = 0; y < H; y += 20) { ctx.beginPath(); ctx.moveTo(0,y); ctx.lineTo(W,y); ctx.stroke(); }
}

function drawBricks() {
  bricks.forEach(br => {
    if (!br.alive) return;
    br.pulse += .04;
    const flash = br.flashTimer > 0;
    if (br.flashTimer > 0) br.flashTimer--;
    ctx.save();
    ctx.shadowBlur = flash ? 30 : 10 + Math.sin(br.pulse)*4; ctx.shadowColor = br.glow;
    ctx.fillStyle = flash ? '#ffffff' : br.color;
    ctx.globalAlpha = flash ? .9 : (br.hp > 1 ? .65 : 1);
    ctx.fillRect(br.x, br.y, br.w, br.h);
    const shine = ctx.createLinearGradient(br.x, br.y, br.x, br.y + br.h*.5);
    shine.addColorStop(0, 'rgba(255,255,255,.25)'); shine.addColorStop(1, 'rgba(255,255,255,0)');
    ctx.fillStyle = shine; ctx.globalAlpha = 1; ctx.fillRect(br.x, br.y, br.w, br.h*.5);
    ctx.restore();
  });
}

function drawPaddle() {
  const pw = paddle.w;
  const isWide = !!activeEffects['wide'];
  ctx.save();
  ctx.shadowBlur = 20; ctx.shadowColor = isWide ? 'rgba(0,255,255,.9)' : 'rgba(0,255,255,.7)';
  const grad = ctx.createLinearGradient(paddle.x, PADDLE_Y, paddle.x+pw, PADDLE_Y+PADDLE_H);
  grad.addColorStop(0, isWide ? '#00ffff' : '#00b4ff');
  grad.addColorStop(.5, '#00ffff');
  grad.addColorStop(1, isWide ? '#00ffff' : '#00b4ff');
  ctx.fillStyle = grad;
  roundRect(paddle.x, PADDLE_Y, pw, PADDLE_H, 5); ctx.fill();
  const shine = ctx.createLinearGradient(paddle.x, PADDLE_Y, paddle.x, PADDLE_Y+PADDLE_H*.5);
  shine.addColorStop(0, 'rgba(255,255,255,.4)'); shine.addColorStop(1, 'rgba(255,255,255,0)');
  ctx.shadowBlur = 0; ctx.fillStyle = shine;
  roundRect(paddle.x, PADDLE_Y, pw, PADDLE_H*.5, 5); ctx.fill();
  ctx.restore();
}

function drawBall(b) {
  b.trail.push({x: b.x, y: b.y});
  if (b.trail.length > 10) b.trail.shift();
  const ballColor = b.extra ? '#ff2d78' : '#00ffff';
  const glowColor = b.extra ? 'rgba(255,45,120,.8)' : 'rgba(0,255,255,.8)';
  b.trail.forEach((t, i) => {
    ctx.save(); ctx.globalAlpha = (i/b.trail.length)*0.4;
    ctx.shadowBlur = 8; ctx.shadowColor = glowColor; ctx.fillStyle = ballColor;
    ctx.beginPath(); ctx.arc(t.x, t.y, BALL_R*(i/b.trail.length), 0, Math.PI*2); ctx.fill();
    ctx.restore();
  });
  ctx.save();
  ctx.shadowBlur = 18; ctx.shadowColor = glowColor;
  const bg = ctx.createRadialGradient(b.x-2, b.y-2, 1, b.x, b.y, BALL_R);
  bg.addColorStop(0, '#ffffff'); bg.addColorStop(.4, ballColor); bg.addColorStop(1, 'transparent');
  ctx.fillStyle = bg;
  ctx.beginPath(); ctx.arc(b.x, b.y, BALL_R, 0, Math.PI*2); ctx.fill();
  ctx.restore();
}

function roundRect(x, y, w, h, r) {
  ctx.beginPath(); ctx.moveTo(x+r,y);
  ctx.lineTo(x+w-r,y); ctx.quadraticCurveTo(x+w,y,x+w,y+r);
  ctx.lineTo(x+w,y+h-r); ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);
  ctx.lineTo(x+r,y+h); ctx.quadraticCurveTo(x,y+h,x,y+h-r);
  ctx.lineTo(x,y+r); ctx.quadraticCurveTo(x,y,x+r,y); ctx.closePath();
}
function roundRect2(x, y, w, h, r) { roundRect(x, y, w, h, r); }

function draw() {
  ctx.clearRect(0, 0, W, H);
  drawGrid(); drawBricks(); drawParticles();
  drawPowerUps(); drawLasers();
  balls.forEach(drawBall);
  drawPaddle(); drawShield();
}

// ============================================================
// GAME LOOP
// ============================================================
let animId = null;
paused_ = false;
gameRunning = false;

function gameLoop() {
  if (!gameRunning || paused_) return;
  update(); draw();
  animId = requestAnimationFrame(gameLoop);
}

function update() {
  pulseTick++;
  tickEffects();
  fireLasers();

  // Paddle input
  if (keys['ArrowLeft']  || keys['a'] || keys['A']) paddle.x = Math.max(0, paddle.x - 7);
  if (keys['ArrowRight'] || keys['d'] || keys['D']) paddle.x = Math.min(W - paddle.w, paddle.x + 7);
  const tx = Math.max(0, Math.min(W - paddle.w, paddleTarget - paddle.w/2));
  paddle.x += (tx - paddle.x) * 0.18;

  // Balls
  for (let i = balls.length-1; i >= 0; i--) {
    const b = balls[i];
    b.x += b.vx; b.y += b.vy;
    if (b.x - BALL_R < 0)  { b.x = BALL_R;     b.vx =  Math.abs(b.vx); }
    if (b.x + BALL_R > W)  { b.x = W - BALL_R; b.vx = -Math.abs(b.vx); }
    if (b.y - BALL_R < 0)  { b.y = BALL_R;     b.vy =  Math.abs(b.vy); }
    if (b.y - BALL_R > H) {
      // Shield catches it
      if (activeEffects['shield']) {
        b.y = H - BALL_R - 5; b.vy = -Math.abs(b.vy);
        spawnBurst(b.x, H - 4, '#cc44ff', 6);
      } else if (b.extra || balls.length > 1) {
        balls.splice(i, 1);
      } else {
        loseLife(); return;
      }
      continue;
    }
    ballPaddleCollision(b);
    ballBrickCollision(b);
  }

  updateParticles();
  updatePowerUps();
  updateLasers();

  if (bricks.every(br => !br.alive)) nextLevel();
}

function loseLife() {
  lives--;
  updateLives();
  if (lives <= 0) gameOver();
  else { balls = [makeBall()]; paddle.x = W/2 - paddle.w/2; }
}

function nextLevel() {
  level++;
  updateHUD();
  bricks = makeBricks();
  const spd = 4 + (level-1)*0.3;
  balls = [makeBall()];
  paddle.x = W/2 - PADDLE_W/2; paddle.w = PADDLE_W;
  activeEffects = {}; lasers = []; pendingLaserShots = []; renderEffectBar();
  const banner = document.getElementById('levelBanner');
  document.getElementById('levelBannerText').textContent = 'LEVEL ' + level;
  banner.classList.remove('show'); void banner.offsetWidth; banner.classList.add('show');
  setTimeout(() => banner.classList.remove('show'), 950);
}

function gameOver() {
  gameRunning = false;
  cancelAnimationFrame(animId); animId = null;
  draw();
  document.getElementById('overlayTitle').textContent = score > 0 ? 'GAME OVER' : 'NEON BREAKER';
  document.getElementById('overlayMsg').textContent   = score > 0 ? 'The grid claims another victim.' : "Break the blocks. Don't drop the ball.";
  const fs = document.getElementById('overlayScore');
  fs.style.display = score > 0 ? 'block' : 'none';
  if (score > 0) fs.textContent = 'SCORE: ' + score;
  document.getElementById('startBtn').textContent = score > 0 ? 'PLAY AGAIN' : 'START GAME';
  document.getElementById('menuBtn').style.display = score > 0 ? 'inline-block' : 'none';
  document.getElementById('overlay').style.display = 'flex';
}

function startGame() {
  document.getElementById('overlay').style.display = 'none';
  init(); gameRunning = true; paused_ = false;
  if (animId) cancelAnimationFrame(animId);
  animId = requestAnimationFrame(gameLoop);
}

function goToMainMenu() {
  gameRunning = false; paused_ = false;
  document.getElementById('pauseMenu').classList.remove('active');
  if (animId) { cancelAnimationFrame(animId); animId = null; }
  gameOver();
}

// ============================================================
// PAUSE
// ============================================================
function togglePause() {
  if (!gameRunning) return;
  paused_ ? resumeGame() : pauseGame_();
}
function pauseGame_() {
  paused_ = true; cancelAnimationFrame(animId); animId = null;
  document.getElementById('pmScore').textContent = score;
  document.getElementById('pmLevel').textContent = level;
  document.getElementById('pauseMenu').classList.add('active');
}
function resumeGame() {
  paused_ = false;
  document.getElementById('pauseMenu').classList.remove('active');
  animId = requestAnimationFrame(gameLoop);
}
function pmRetry()  { paused_ = false; document.getElementById('pauseMenu').classList.remove('active'); startGame(); }
function pmExit()   { paused_ = false; document.getElementById('pauseMenu').classList.remove('active'); goToMainMenu(); }

// ============================================================
// INPUT
// ============================================================
document.addEventListener('keydown', e => {
  if (e.key === 'Escape' && gameRunning) { togglePause(); return; }
  keys[e.key] = true;
});
document.addEventListener('keyup', e => { keys[e.key] = false; });
canvas.addEventListener('mousemove', e => {
  const rect = canvas.getBoundingClientRect();
  paddleTarget = (e.clientX - rect.left) * (W / rect.width);
});
canvas.addEventListener('touchmove', e => {
  e.preventDefault();
  const rect = canvas.getBoundingClientRect();
  paddleTarget = (e.touches[0].clientX - rect.left) * (W / rect.width);
}, { passive: false });
document.getElementById('startBtn').addEventListener('click', startGame);

// ============================================================
// INITIAL DRAW
// ============================================================
ctx.clearRect(0, 0, W, H); drawGrid();

// ============================================================
// GLITCH TRANSITION (matching index.html system)
// ============================================================
(function() {
  // Entry animation
  const entryOverlay = document.createElement('div');
  entryOverlay.id = 'glitchEntry';
  const entryStyle = document.createElement('style');
  entryStyle.textContent = `
    #glitchEntry { position:fixed;inset:0;z-index:99998;pointer-events:none;background:#030a1a; }
    #glitchEntryCanvas { position:absolute;inset:0;width:100%;height:100%; }
    @keyframes glitchEntryFade { 0%{opacity:1} 100%{opacity:0} }
  `;
  document.head.appendChild(entryStyle);
  const entryCanvas = document.createElement('canvas');
  entryCanvas.id = 'glitchEntryCanvas';
  entryOverlay.appendChild(entryCanvas);
  document.body.appendChild(entryOverlay);
  const ectx = entryCanvas.getContext('2d');
  let ew = entryCanvas.width = window.innerWidth;
  let eh = entryCanvas.height = window.innerHeight;
  let eStart = null;
  const eDur = 900;
  function entryFrame(ts) {
    if (!eStart) eStart = ts;
    const p = Math.min((ts - eStart) / eDur, 1);
    ectx.clearRect(0, 0, ew, eh);
    const cols = Math.ceil(ew / 8);
    for (let i = 0; i < cols; i++) {
      const threshold = (i / cols) * 0.6 + 0.4 * Math.random();
      if (p < threshold) {
        ectx.fillStyle = '#030a1a';
        ectx.fillRect(i * 8, 0, 8, eh);
      }
    }
    if (p < 1) requestAnimationFrame(entryFrame);
    else { entryOverlay.style.animation = 'glitchEntryFade .3s ease forwards'; setTimeout(() => entryOverlay.remove(), 320); }
  }
  requestAnimationFrame(entryFrame);

  // Exit glitch on back links
  document.querySelectorAll('a[href="index.html"]').forEach(a => {
    a.addEventListener('click', e => {
      e.preventDefault();
      const exitOverlay = document.createElement('div');
      exitOverlay.style.cssText = 'position:fixed;inset:0;z-index:99999;background:#030a1a;pointer-events:all;';
      const ec = document.createElement('canvas');
      ec.style.cssText = 'position:absolute;inset:0;width:100%;height:100%;';
      exitOverlay.appendChild(ec);
      document.body.appendChild(exitOverlay);
      ec.width = window.innerWidth; ec.height = window.innerHeight;
      const xctx = ec.getContext('2d');
      let xStart = null; const xDur = 700;
      function exitFrame(ts) {
        if (!xStart) xStart = ts;
        const p = Math.min((ts - xStart) / xDur, 1);
        xctx.clearRect(0, 0, ec.width, ec.height);
        xctx.fillStyle = '#030a1a'; xctx.fillRect(0, 0, ec.width, ec.height);
        const bands = 6;
        for (let b = 0; b < bands; b++) {
          if (Math.random() < p * 0.8) {
            const bh = Math.random() * 40 + 10;
            const by = Math.random() * ec.height;
            const shift = (Math.random() - 0.5) * 40 * p;
            xctx.fillStyle = `rgba(0,255,255,${Math.random() * 0.15})`;
            xctx.fillRect(shift, by, ec.width, bh);
          }
        }
        const noise = xctx.createImageData(ec.width, ec.height);
        for (let i = 0; i < noise.data.length; i += 4) {
          const v = Math.random() < p * 0.3 ? 255 : 0;
          noise.data[i] = noise.data[i+1] = noise.data[i+2] = v;
          noise.data[i+3] = v > 0 ? Math.random() * 80 : 0;
        }
        xctx.putImageData(noise, 0, 0);
        if (p < 1) requestAnimationFrame(exitFrame);
        else window.location.href = 'index.html';
      }
      requestAnimationFrame(exitFrame);
    });
  });
})();
</script>
