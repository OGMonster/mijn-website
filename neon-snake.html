<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>OG Monster – Neon Snake</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow+Condensed:wght@400;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --neon-green: #00ff88;
      --hot-pink: #ff2d78;
      --electric-yellow: #ffe600;
      --electric-blue: #00b4ff;
      --deep-purple: #0d0a2e;
      --dark-bg: #030a1a;
      --card-bg: #080f28;
      --text: #e0eeff;
      --muted: #6a9ecf;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--dark-bg);
      color: var(--text);
      font-family: 'Barlow Condensed', sans-serif;
      overflow-x: hidden;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 0;
      opacity: 0.4;
    }

    nav {
      position: fixed;
      top: 0;
      width: 100%;
      padding: 1rem 2rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
      z-index: 100;
      background: linear-gradient(to bottom, rgba(3,10,26,0.95), transparent);
    }

    nav .logo {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 1.6rem;
      color: var(--neon-green);
      text-shadow: 0 0 20px var(--neon-green);
      text-decoration: none;
      letter-spacing: 2px;
    }

    nav a {
      color: var(--muted);
      text-decoration: none;
      font-size: 1rem;
      font-weight: 600;
      letter-spacing: 1px;
      text-transform: uppercase;
      transition: color 0.2s;
    }
    nav a:hover { color: var(--neon-green); }

    .game-wrapper {
      position: relative;
      z-index: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1.5rem;
      padding: 6rem 1rem 2rem;
    }

    h1 {
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(2.5rem, 6vw, 4rem);
      letter-spacing: 4px;
      color: var(--neon-green);
      text-shadow: 0 0 30px var(--neon-green), 0 0 60px rgba(0,255,136,0.3);
      text-align: center;
    }

    h1 span {
      color: var(--hot-pink);
      text-shadow: 0 0 30px var(--hot-pink), 0 0 60px rgba(255,45,120,0.3);
    }

    .scoreboard {
      display: flex;
      gap: 2rem;
      font-family: 'Space Mono', monospace;
      font-size: 1rem;
    }

    .score-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.2rem;
    }

    .score-label {
      color: var(--muted);
      font-size: 0.7rem;
      letter-spacing: 2px;
      text-transform: uppercase;
    }

    .score-value {
      color: var(--electric-yellow);
      font-size: 1.4rem;
      text-shadow: 0 0 10px var(--electric-yellow);
    }

    #gameCanvas {
      border: 1px solid rgba(0,255,136,0.3);
      box-shadow: 0 0 30px rgba(0,255,136,0.15), 0 0 60px rgba(0,255,136,0.05), inset 0 0 30px rgba(0,0,0,0.5);
      background: rgba(8,15,40,0.9);
      display: block;
      max-width: 100%;
    }

    .controls {
      display: flex;
      gap: 1rem;
      flex-wrap: wrap;
      justify-content: center;
    }

    .btn {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 1.2rem;
      letter-spacing: 2px;
      padding: 0.6rem 2rem;
      border: none;
      cursor: pointer;
      transition: all 0.2s;
      text-transform: uppercase;
    }

    .btn-primary {
      background: var(--neon-green);
      color: var(--dark-bg);
      box-shadow: 0 0 20px rgba(0,255,136,0.5);
    }
    .btn-primary:hover {
      background: #00ffaa;
      box-shadow: 0 0 30px rgba(0,255,136,0.8);
      transform: translateY(-2px);
    }

    .btn-secondary {
      background: transparent;
      color: var(--hot-pink);
      border: 1px solid var(--hot-pink);
      box-shadow: 0 0 10px rgba(255,45,120,0.2);
    }
    .btn-secondary:hover {
      background: rgba(255,45,120,0.1);
      box-shadow: 0 0 20px rgba(255,45,120,0.4);
    }

    .hint {
      color: var(--muted);
      font-size: 0.85rem;
      letter-spacing: 1px;
      text-align: center;
    }

    /* Overlay screens */
    #overlay {
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background: rgba(3,10,26,0.85);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 1.2rem;
      z-index: 10;
    }

    #overlay h2 {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 3rem;
      letter-spacing: 4px;
      color: var(--hot-pink);
      text-shadow: 0 0 30px var(--hot-pink);
    }

    #overlay p {
      color: var(--muted);
      font-size: 1rem;
      letter-spacing: 1px;
      text-align: center;
      padding: 0 1rem;
    }

    #overlay .final-score {
      font-family: 'Space Mono', monospace;
      font-size: 2rem;
      color: var(--electric-yellow);
      text-shadow: 0 0 20px var(--electric-yellow);
    }

    .canvas-container {
      position: relative;
    }

    /* Mobile D-pad */
    .dpad {
      display: none;
      flex-direction: column;
      align-items: center;
      gap: 4px;
      margin-top: 0.5rem;
    }

    .dpad-row {
      display: flex;
      gap: 4px;
    }

    .dpad-btn {
      width: 52px;
      height: 52px;
      background: rgba(0,255,136,0.1);
      border: 1px solid rgba(0,255,136,0.3);
      color: var(--neon-green);
      font-size: 1.4rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      user-select: none;
      -webkit-user-select: none;
      transition: background 0.1s;
    }

    .dpad-btn:active {
      background: rgba(0,255,136,0.3);
    }

    @media (max-width: 600px) {
      .dpad { display: flex; }
      .hint { display: none; }
    }

    .back-link {
      color: var(--muted);
      text-decoration: none;
      font-size: 0.85rem;
      letter-spacing: 1px;
      text-transform: uppercase;
      transition: color 0.2s;
    }
    .back-link:hover { color: var(--neon-green); }
  </style>
</head>
<body>

  <nav>
    <a href="index.html" class="logo">OG Monster</a>
    <a href="index.html">← Back</a>
  </nav>

  <div class="game-wrapper">
    <h1>NEON <span>SNAKE</span></h1>

    <div class="scoreboard">
      <div class="score-item">
        <span class="score-label">Score</span>
        <span class="score-value" id="scoreDisplay">0</span>
      </div>
      <div class="score-item">
        <span class="score-label">Best</span>
        <span class="score-value" id="highScoreDisplay">0</span>
      </div>
      <div class="score-item">
        <span class="score-label">Level</span>
        <span class="score-value" id="levelDisplay">1</span>
      </div>
    </div>

    <div class="canvas-container">
      <canvas id="gameCanvas" width="400" height="400"></canvas>
      <div id="overlay">
        <h2 id="overlayTitle">NEON SNAKE</h2>
        <p id="overlayMsg">Navigate the neon grid. Eat the orbs. Don't crash.</p>
        <div class="final-score" id="overlayScore" style="display:none"></div>
        <button class="btn btn-primary" id="startBtn">START GAME</button>
      </div>
    </div>

    <div class="dpad">
      <div class="dpad-row">
        <button class="dpad-btn" id="upBtn">▲</button>
      </div>
      <div class="dpad-row">
        <button class="dpad-btn" id="leftBtn">◀</button>
        <button class="dpad-btn" id="downBtn">▼</button>
        <button class="dpad-btn" id="rightBtn">▶</button>
      </div>
    </div>

    <p class="hint">Arrow keys or WASD to move · P to pause</p>
    <a href="index.html" class="back-link">← Back to OG Monster</a>
  </div>

  <script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');

    const GRID = 20;
    const COLS = canvas.width / GRID;
    const ROWS = canvas.height / GRID;

    const COLORS = {
      snakeHead: '#00ff88',
      snakeBody: '#00cc66',
      snakeGlow: 'rgba(0,255,136,0.6)',
      food: '#ff2d78',
      foodGlow: 'rgba(255,45,120,0.8)',
      bonus: '#ffe600',
      bonusGlow: 'rgba(255,230,0,0.8)',
      grid: 'rgba(0,180,255,0.04)',
      text: '#e0eeff',
    };

    let snake, dir, nextDir, food, bonus, score, highScore, level, speed, gameLoop, paused, bonusTimer;

    highScore = parseInt(localStorage.getItem('ogSnakeHigh') || '0');
    document.getElementById('highScoreDisplay').textContent = highScore;

    function init() {
      snake = [
        {x: 10, y: 10},
        {x: 9, y: 10},
        {x: 8, y: 10},
      ];
      dir = {x: 1, y: 0};
      nextDir = {x: 1, y: 0};
      score = 0;
      level = 1;
      speed = 150;
      paused = false;
      bonus = null;
      bonusTimer = null;
      spawnFood();
      updateHUD();
    }

    function spawnFood() {
      let pos;
      do {
        pos = {x: Math.floor(Math.random() * COLS), y: Math.floor(Math.random() * ROWS)};
      } while (snake.some(s => s.x === pos.x && s.y === pos.y));
      food = pos;
    }

    function spawnBonus() {
      if (bonus) return;
      let pos;
      do {
        pos = {x: Math.floor(Math.random() * COLS), y: Math.floor(Math.random() * ROWS)};
      } while (snake.some(s => s.x === pos.x && s.y === pos.y) || (food.x === pos.x && food.y === pos.y));
      bonus = pos;
      bonusTimer = setTimeout(() => { bonus = null; }, 5000);
    }

    function updateHUD() {
      document.getElementById('scoreDisplay').textContent = score;
      document.getElementById('highScoreDisplay').textContent = highScore;
      document.getElementById('levelDisplay').textContent = level;
    }

    function drawGrid() {
      ctx.strokeStyle = COLORS.grid;
      ctx.lineWidth = 0.5;
      for (let x = 0; x <= COLS; x++) {
        ctx.beginPath();
        ctx.moveTo(x * GRID, 0);
        ctx.lineTo(x * GRID, canvas.height);
        ctx.stroke();
      }
      for (let y = 0; y <= ROWS; y++) {
        ctx.beginPath();
        ctx.moveTo(0, y * GRID);
        ctx.lineTo(canvas.width, y * GRID);
        ctx.stroke();
      }
    }

    function drawGlowRect(x, y, color, glowColor, size = GRID - 2) {
      const px = x * GRID + 1;
      const py = y * GRID + 1;
      ctx.shadowColor = glowColor;
      ctx.shadowBlur = 12;
      ctx.fillStyle = color;
      ctx.fillRect(px, py, size, size);
      ctx.shadowBlur = 0;
    }

    function drawCircle(x, y, color, glowColor) {
      const cx = x * GRID + GRID / 2;
      const cy = y * GRID + GRID / 2;
      const r = GRID / 2 - 2;
      ctx.shadowColor = glowColor;
      ctx.shadowBlur = 20;
      ctx.fillStyle = color;
      ctx.beginPath();
      ctx.arc(cx, cy, r, 0, Math.PI * 2);
      ctx.fill();
      ctx.shadowBlur = 0;

      // inner shine
      ctx.fillStyle = 'rgba(255,255,255,0.3)';
      ctx.beginPath();
      ctx.arc(cx - r * 0.25, cy - r * 0.25, r * 0.35, 0, Math.PI * 2);
      ctx.fill();
    }

    function drawSnake() {
      snake.forEach((seg, i) => {
        const isHead = i === 0;
        const alpha = isHead ? 1 : Math.max(0.3, 1 - (i / snake.length) * 0.6);
        const color = isHead ? COLORS.snakeHead : `rgba(0,${Math.floor(180 + alpha * 75)},${Math.floor(alpha * 100)},${alpha})`;
        const glow = isHead ? COLORS.snakeGlow : `rgba(0,255,136,${alpha * 0.4})`;
        drawGlowRect(seg.x, seg.y, color, glow);

        if (isHead) {
          // eyes
          const px = seg.x * GRID;
          const py = seg.y * GRID;
          ctx.fillStyle = '#030a1a';
          const eyeOffset = 4;
          if (dir.x === 1) { ctx.fillRect(px+13, py+3, 3, 3); ctx.fillRect(px+13, py+13, 3, 3); }
          else if (dir.x === -1) { ctx.fillRect(px+3, py+3, 3, 3); ctx.fillRect(px+3, py+13, 3, 3); }
          else if (dir.y === -1) { ctx.fillRect(px+3, py+3, 3, 3); ctx.fillRect(px+13, py+3, 3, 3); }
          else { ctx.fillRect(px+3, py+13, 3, 3); ctx.fillRect(px+13, py+13, 3, 3); }
        }
      });
    }

    let foodPulse = 0;
    let bonusPulse = 0;

    function draw() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      drawGrid();

      foodPulse += 0.08;
      const foodScale = 1 + Math.sin(foodPulse) * 0.15;
      ctx.save();
      ctx.translate(food.x * GRID + GRID/2, food.y * GRID + GRID/2);
      ctx.scale(foodScale, foodScale);
      ctx.translate(-(food.x * GRID + GRID/2), -(food.y * GRID + GRID/2));
      drawCircle(food.x, food.y, COLORS.food, COLORS.foodGlow);
      ctx.restore();

      if (bonus) {
        bonusPulse += 0.12;
        const bScale = 1 + Math.sin(bonusPulse) * 0.2;
        ctx.save();
        ctx.translate(bonus.x * GRID + GRID/2, bonus.y * GRID + GRID/2);
        ctx.scale(bScale, bScale);
        ctx.translate(-(bonus.x * GRID + GRID/2), -(bonus.y * GRID + GRID/2));
        drawCircle(bonus.x, bonus.y, COLORS.bonus, COLORS.bonusGlow);
        ctx.restore();

        // ★ star symbol
        ctx.fillStyle = '#030a1a';
        ctx.font = 'bold 10px sans-serif';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillText('★', bonus.x * GRID + GRID/2, bonus.y * GRID + GRID/2);
      }

      drawSnake();
    }

    function step() {
      if (paused) return;

      dir = nextDir;
      const head = {x: snake[0].x + dir.x, y: snake[0].y + dir.y};

      // wall collision
      if (head.x < 0 || head.x >= COLS || head.y < 0 || head.y >= ROWS) return gameOver();
      // self collision
      if (snake.some(s => s.x === head.x && s.y === head.y)) return gameOver();

      snake.unshift(head);

      if (head.x === food.x && head.y === food.y) {
        score += 10 * level;
        if (score > highScore) {
          highScore = score;
          localStorage.setItem('ogSnakeHigh', highScore);
        }
        spawnFood();
        if (snake.length % 5 === 0) spawnBonus();
        if (snake.length % 10 === 0) {
          level++;
          speed = Math.max(60, speed - 15);
          clearInterval(gameLoop);
          gameLoop = setInterval(step, speed);
        }
        updateHUD();
      } else if (bonus && head.x === bonus.x && head.y === bonus.y) {
        score += 50 * level;
        if (score > highScore) {
          highScore = score;
          localStorage.setItem('ogSnakeHigh', highScore);
        }
        clearTimeout(bonusTimer);
        bonus = null;
        updateHUD();
      } else {
        snake.pop();
      }

      draw();
    }

    function gameOver() {
      clearInterval(gameLoop);
      clearTimeout(bonusTimer);
      const overlay = document.getElementById('overlay');
      document.getElementById('overlayTitle').textContent = 'GAME OVER';
      document.getElementById('overlayMsg').textContent = 'The neon grid claims another victim.';
      const fs = document.getElementById('overlayScore');
      fs.style.display = 'block';
      fs.textContent = `SCORE: ${score}`;
      document.getElementById('startBtn').textContent = 'PLAY AGAIN';
      overlay.style.display = 'flex';
    }

    function startGame() {
      document.getElementById('overlay').style.display = 'none';
      init();
      clearInterval(gameLoop);
      gameLoop = setInterval(step, speed);
      draw();
    }

    document.getElementById('startBtn').addEventListener('click', startGame);

    document.addEventListener('keydown', e => {
      switch(e.key) {
        case 'ArrowUp': case 'w': case 'W':
          if (dir.y !== 1) nextDir = {x:0, y:-1}; break;
        case 'ArrowDown': case 's': case 'S':
          if (dir.y !== -1) nextDir = {x:0, y:1}; break;
        case 'ArrowLeft': case 'a': case 'A':
          if (dir.x !== 1) nextDir = {x:-1, y:0}; break;
        case 'ArrowRight': case 'd': case 'D':
          if (dir.x !== -1) nextDir = {x:1, y:0}; break;
        case 'p': case 'P':
          paused = !paused; break;
      }
      if (['ArrowUp','ArrowDown','ArrowLeft','ArrowRight'].includes(e.key)) e.preventDefault();
    });

    // D-pad
    document.getElementById('upBtn').addEventListener('click', () => { if (dir.y !== 1) nextDir = {x:0, y:-1}; });
    document.getElementById('downBtn').addEventListener('click', () => { if (dir.y !== -1) nextDir = {x:0, y:1}; });
    document.getElementById('leftBtn').addEventListener('click', () => { if (dir.x !== 1) nextDir = {x:-1, y:0}; });
    document.getElementById('rightBtn').addEventListener('click', () => { if (dir.x !== -1) nextDir = {x:1, y:0}; });

    // Initial draw
    draw();
  </script>
</body>
</html>
